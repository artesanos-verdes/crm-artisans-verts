/* ---- import CSV (lignes & catalogue) ---- */
const LIGNE_DEFS=[['fournisseur','Fournisseur'],['facture','N° facture'],['date','Date'],['ref','Référence produit'],['libelle','Désignation / libellé'],['quantite','Quantité'],['puFacture','PU facturé HT'],['remiseAppliquee','Remise appliquée (%)'],['totalHT','Total ligne HT']];
const CATA_DEFS=[['fournisseur','Fournisseur'],['ref','Référence produit'],['libelle','Désignation / libellé'],['puConvenu','PU convenu HT'],['remiseAttendue','Remise attendue (%)']];
function guessLignes(h){ const f=(...k)=>h.findIndex(x=>k.some(s=>x.toLowerCase().includes(s)));
  return {fournisseur:f('fournisseur','fourni','tiers','société','societe'),facture:f('facture','n°','numéro','numero','pièce','piece'),date:f('date'),ref:f('réf','ref','code','article','sku'),libelle:f('désign','design','libell','produit','description'),quantite:f('quant','qté','qte'),puFacture:f('pu ','p.u','prix unit','unitaire','pu'),remiseAppliquee:f('remise','rabais','discount'),totalHT:f('total','montant ht','montant','ht')}; }
function guessCata(h){ const f=(...k)=>h.findIndex(x=>k.some(s=>x.toLowerCase().includes(s)));
  return {fournisseur:f('fournisseur','fourni','tiers'),ref:f('réf','ref','code','article','sku'),libelle:f('désign','design','libell','produit','description'),puConvenu:f('convenu','négoci','negoci','tarif','prix','unitaire','pu'),remiseAttendue:f('remise','rabais','discount')}; }
function commitLignes(rows,map){ let n=0;
  rows.forEach(r=>{ const c=k=>map[k]>=0?(r[map[k]]||'').trim():'';
    state.lignes.push({id:uid('l'),fournisseur:c('fournisseur'),facture:c('facture'),date:normDate(c('date')),ref:c('ref'),libelle:c('libelle'),
      quantite:parseNum(c('quantite'))||1,puFacture:parseNum(c('puFacture')),remiseAppliquee:parseNum(c('remiseAppliquee')),
      totalHT:(map.totalHT>=0 && c('totalHT')!=='')?parseNum(c('totalHT')):''}); n++; });
  save(); closeModal(); go('controle'); toast(`${n} lignes importées`,'ok');
}
function commitCatalogue(rows,map){ let n=0;
  rows.forEach(r=>{ const c=k=>map[k]>=0?(r[map[k]]||'').trim():''; if(!c('libelle') && !c('ref')) return;
    state.catalogue.push({id:uid('c'),fournisseur:c('fournisseur'),ref:c('ref'),libelle:c('libelle'),puConvenu:parseNum(c('puConvenu')),remiseAttendue:parseNum(c('remiseAttendue'))}); n++; });
  save(); closeModal(); go('controle'); toast(`${n} références importées`,'ok');
}
function pickCSV(cb){ const i=document.createElement('input'); i.type='file'; i.accept='.csv,.tsv,.txt';
  i.onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{ const txt=ev.target.result; cb(parseCSV(txt,detectDelim(txt))); }; r.readAsText(f,'utf-8'); }; i.click(); }
function importLignes(){ pickCSV(rows=>startGenericMapping(rows,LIGNE_DEFS,guessLignes,commitLignes,'lignes de facture')); }
function importCatalogue(){ pickCSV(rows=>startGenericMapping(rows,CATA_DEFS,guessCata,commitCatalogue,'référentiel tarifaire')); }

let gImp={rows:null,headers:null,defs:null,commit:null};
function startGenericMapping(rows,defs,guess,commit,noun){
  if(rows.length<2){ toast('Fichier vide ou sans données.','err'); return; }
  gImp={rows:rows.slice(1),headers:rows[0].map(h=>h.trim()),defs,commit};
  const g=guess(gImp.headers);
  const opt=sel=>`<option value="-1">— Ignorer —</option>`+gImp.headers.map((h,i)=>`<option value="${i}" ${sel===i?'selected':''}>${esc(h||('Col '+(i+1)))}</option>`).join('');
  const prev=gImp.rows.slice(0,4);
  document.getElementById('modal').className='modal wide';
  document.getElementById('modal').innerHTML=`
    <div class="modal-head"><h3>Associer les colonnes — ${noun} (${gImp.rows.length} lignes)</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:14px">Relie chaque champ à une colonne de ton fichier.</p>
      <table class="map-table"><tbody>${defs.map(([k,lbl])=>`<tr><td>${lbl}</td><td><select id="gm_${k}">${opt(g[k])}</select></td></tr>`).join('')}</tbody></table>
      <div class="preview-tbl"><div style="overflow-x:auto"><table><thead><tr>${gImp.headers.map(h=>`<th class="no-sort">${esc(h)}</th>`).join('')}</tr></thead><tbody>${prev.map(r=>`<tr>${gImp.headers.map((_,i)=>`<td>${esc(r[i]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>
    </div>
    <div class="modal-foot"><span style="font-size:12px;color:var(--ink-soft)">Aperçu (4 lignes)</span>
      <div style="display:flex;gap:8px"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn primary" onclick="runGenericCommit()">Importer</button></div></div>`;
  document.getElementById('overlay').classList.add('open');
}
function runGenericCommit(){ const map={}; gImp.defs.forEach(([k])=>map[k]=parseInt(document.getElementById('gm_'+k).value)); gImp.commit(gImp.rows,map); }

/* ---- réclamations (LRAR déterministe) ---- */
function buildLetter(four, items){
  const total=items.reduce((s,a)=>s+a.ecart,0);
  const d=new Date().toLocaleDateString('fr-FR');
  const lignes=items.map(a=>`  • Facture ${a.l.facture||'—'} — ${a.l.libelle||a.l.ref||'(désignation)'} — ${a.categorie} : ${fmt(a.ecart)}`).join('\n');
  return `LES ARTISANS VERTS
[Adresse — à compléter]

À l'attention de : ${four}
[Adresse du fournisseur — à compléter]

Objet : Réclamation — erreurs de facturation
Envoi en recommandé avec accusé de réception
Le ${d}

Madame, Monsieur,

Après contrôle de vos factures, nous avons relevé les écarts de facturation suivants, non conformes à nos accords tarifaires :

${lignes}

Montant total réclamé : ${fmt(total)} HT.

Nous vous remercions de bien vouloir émettre un avoir correspondant à cette somme dans un délai de trente (30) jours à compter de la réception du présent courrier.

Dans l'attente de votre régularisation, nous vous prions d'agréer, Madame, Monsieur, l'expression de nos salutations distinguées.

Les Artisans Verts`;
}
function genReclamations(){
  const anoms=runControle().filter(a=>a.severite==='haute' && a.ecart>0);
  if(!anoms.length){ toast('Aucun écart récupérable à réclamer pour le moment.','err'); return; }
  const byF={}; anoms.forEach(a=>{ const f=a.l.fournisseur||'(fournisseur inconnu)'; (byF[f]=byF[f]||[]).push(a); });
  const fns=Object.keys(byF);
  document.getElementById('modal').className='modal wide';
  document.getElementById('modal').innerHTML=`
    <div class="modal-head"><h3>Réclamations — ${fns.length} fournisseur${fns.length>1?'s':''}</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-body" style="max-height:64vh;overflow:auto">
      ${fns.map((f,i)=>{ const total=byF[f].reduce((s,a)=>s+a.ecart,0); const letter=buildLetter(f,byF[f]);
        return `<div style="border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--surface-2);border-bottom:1px solid var(--line)">
            <div><b>${esc(f)}</b> <span style="color:var(--ink-soft);font-size:12.5px">· ${byF[f].length} ligne(s) · ${fmt(total)} HT</span></div>
            <div style="display:flex;gap:6px"><button class="btn sm" onclick="copyText('letter_${i}')">Copier</button><button class="btn sm" onclick="dlLetter('letter_${i}','${esc(f).replace(/[^a-z0-9]/gi,'_')}')">.txt</button></div>
          </div>
          <pre id="letter_${i}" style="margin:0;padding:14px;font-family:'IBM Plex Mono',monospace;font-size:12px;white-space:pre-wrap;line-height:1.55;color:var(--ink)">${esc(letter)}</pre>
        </div>`; }).join('')}
    </div>
    <div class="modal-foot"><span style="font-size:12px;color:var(--ink-soft)">Modèle LRAR — complète les adresses avant envoi.</span>
      <button class="btn primary" onclick="closeModal()">Fermer</button></div>`;
  document.getElementById('overlay').classList.add('open');
}
function dlLetter(id,name){ dl(document.getElementById(id).innerText, `reclamation-${name}-${todayISO()}.txt`, 'text/plain;charset=utf-8'); toast('Lettre téléchargée','ok'); }
function copyText(id){ const t=document.getElementById(id).innerText;
  if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>toast('Copié','ok'),()=>toast('Copie impossible','err')); }
  else { const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy'); toast('Copié','ok');}catch(e){toast('Copie impossible','err');} ta.remove(); } }

/* ============================================================
   ASSISTANT IA INTÉGRÉ — "demande des actions depuis l'intérieur"
   Double mode : préversion claude.ai (sans clé) / déployé (proxy ou clé Anthropic).
   Le modèle renvoie un JSON {reply, actions[]} que le CRM exécute localement.
   ============================================================ */
const AI_MODEL='claude-sonnet-4-6';
const AI_SYSTEM=`Tu es l'assistant intégré au CRM "Les Artisans Verts" (comptabilité CEE/CAE, fournisseurs/prestataires, contrôle des prix). Tu réponds en français, de façon concise et directe.

Tu peux exécuter des actions dans le CRM. Tu DOIS répondre UNIQUEMENT par un objet JSON valide, sans aucun texte autour ni balise Markdown, de la forme :
{"reply":"phrase courte pour l'utilisateur","actions":[ ... ]}

"reply" = ce que tu dis à l'utilisateur. "actions" = liste (éventuellement vide) d'actions à exécuter.

Actions disponibles :
- {"type":"creer_dossier","nom":"...","client":"...","fiche":"RES022|BAT-TH-126|...","zone":"C|D|E","statut":"En cours|Terminé|En attente|Annulé","produits":NOMBRE,"notes":"..."} — seul "nom" est obligatoire.
- {"type":"creer_facture","sens":"achat|vente","tiers":"...","ref":"...","libelle":"...","dossier":"nom d'un dossier existant","categorie":"...","ht":NOMBRE,"tva":20,"ttc":NOMBRE,"statut":"attente|paye","echeance":"AAAA-MM-JJ","date":"AAAA-MM-JJ"} — fournis "ht" OU "ttc" (l'autre est calculé).
- {"type":"ajouter_reference","fournisseur":"...","ref":"...","libelle":"...","puConvenu":NOMBRE,"remiseAttendue":NOMBRE} — référentiel tarifaire du contrôle des prix.
- {"type":"ajouter_ligne","fournisseur":"...","facture":"...","date":"AAAA-MM-JJ","ref":"...","libelle":"...","quantite":NOMBRE,"puFacture":NOMBRE,"remiseAppliquee":NOMBRE,"totalHT":NOMBRE} — ligne de facture à contrôler.
- {"type":"ajouter_regle","motCle":"..."} — mot-clé d'une ligne facturée à tort (ex. "vélo cargo").
- {"type":"lancer_controle"} — ouvre le contrôle des prix.
- {"type":"generer_reclamations"} — génère les lettres de réclamation par fournisseur.
- {"type":"naviguer","vue":"dashboard|factures|dossiers|controle|data"}.

Règles :
- Pour créer une facture rattachée à un nouveau chantier, émets d'abord "creer_dossier" puis "creer_facture" dans le même tableau "actions", dans cet ordre ; rattache via le champ "dossier".
- N'invente JAMAIS de montants : si un montant manque, demande-le dans "reply" sans émettre l'action.
- Si la demande est ambiguë, pose une question courte dans "reply" avec actions vides.
- Pour une simple question (ex. "combien je récupère chez AXDIS ?"), réponds dans "reply" à partir de l'état du CRM fourni, actions vides.
- Les montants sont des nombres JSON (pas de symbole €, point décimal).`;

function aiCfg(){ try{ return JSON.parse(localStorage.getItem('lav_ai_cfg')||'{}'); }catch(e){ return {}; } }
function aiSaveCfg(){
  const cfg={ endpoint:(document.getElementById('ai-endpoint').value||'').trim(), key:(document.getElementById('ai-key').value||'').trim() };
  try{ localStorage.setItem('lav_ai_cfg', JSON.stringify(cfg)); }catch(e){}
  document.getElementById('ai-settings').style.display='none';
  aiUpdateMode(); toast('Configuration enregistrée','ok');
}
function aiMode(){ const c=aiCfg(); if(c.endpoint) return 'Proxy configuré'; if(c.key) return 'Clé Anthropic locale'; return 'Préversion claude.ai'; }
function aiUpdateMode(){ const m=document.getElementById('ai-mode'); if(m) m.textContent=aiMode(); }

function aiSnapshot(){
  const tiers=[...new Set(state.factures.map(f=>f.tiers).filter(Boolean))];
  const an=runControle(); const s=controleSummary(an);
  const top=an.filter(a=>a.ecart>0).sort((a,b)=>b.ecart-a.ecart).slice(0,30)
    .map(a=>({fournisseur:a.l.fournisseur||'',facture:a.l.facture||'',motif:a.categorie,ecart:a.ecart}));
  let caVente=0,charges=0; state.factures.forEach(f=>{ if(f.type==='vente')caVente+=f.ht||0; else charges+=f.ht||0; });
  return {
    dossiers: state.dossiers.map(d=>({nom:d.nom,client:d.client||'',fiche:d.fiche||'',statut:d.statut||'',produits:d.produits||''})),
    tiers,
    catalogue: state.catalogue.map(c=>({fournisseur:c.fournisseur||'',ref:c.ref||'',libelle:c.libelle||'',puConvenu:c.puConvenu,remiseAttendue:c.remiseAttendue||0})),
    controle: { recuperable: round2(s.recup), aVerifier: s.verif, anomalies: top },
    totaux: { nbFactures: state.factures.length, nbDossiers: state.dossiers.length, caVenteHT: round2(caVente), chargesHT: round2(charges), margeHT: round2(caVente-charges) }
  };
}

function aiApply(actions){
  const log=[];
  (actions||[]).forEach(a=>{
    try{
      switch(a.type){
        case 'creer_dossier':{
          if(!a.nom){ log.push('⚠️ Dossier sans nom — ignoré'); break; }
          state.dossiers.push({id:uid('d'),nom:a.nom,client:a.client||'',fiche:a.fiche||'',zone:a.zone||'',statut:a.statut||'En cours',produits:(a.produits===''||a.produits==null)?'':parseNum(a.produits),notes:a.notes||''});
          log.push('📁 Dossier créé — '+a.nom); break;
        }
        case 'creer_facture':{
          let dossierId='';
          if(a.dossier){ const q=String(a.dossier).toLowerCase(); const d=state.dossiers.find(x=>(x.nom||'').toLowerCase()===q)||state.dossiers.find(x=>(x.nom||'').toLowerCase().includes(q)); if(d)dossierId=d.id; }
          const rec=normFacture({type:(a.sens||a.type||'achat'),date:a.date||todayISO(),tiers:a.tiers||'',ref:a.ref||'',libelle:a.libelle||'',dossierId,categorie:a.categorie||'',ht:parseNum(a.ht),tva:a.tva==null?20:parseNum(a.tva),ttc:parseNum(a.ttc),statut:a.statut==='paye'?'paye':'attente',echeance:a.echeance||'',_rateLocked:(a.ht!=null&&a.ttc!=null)});
          rec.id=uid('f'); state.factures.unshift(rec);
          log.push('🧾 Facture '+rec.type+' '+(rec.tiers||'')+' — '+fmt(rec.ht)+' HT'+(dossierId?(' → '+a.dossier):'')); break;
        }
        case 'ajouter_reference':{
          if(!a.libelle && !a.ref){ log.push('⚠️ Référence sans libellé/réf — ignorée'); break; }
          state.catalogue.push({id:uid('c'),fournisseur:a.fournisseur||'',ref:a.ref||'',libelle:a.libelle||'',puConvenu:parseNum(a.puConvenu),remiseAttendue:parseNum(a.remiseAttendue)});
          log.push('📘 Référence ajoutée — '+(a.libelle||a.ref)); break;
        }
        case 'ajouter_ligne':{
          state.lignes.push({id:uid('l'),fournisseur:a.fournisseur||'',facture:a.facture||'',date:a.date||'',ref:a.ref||'',libelle:a.libelle||'',quantite:parseNum(a.quantite)||1,puFacture:parseNum(a.puFacture),remiseAppliquee:parseNum(a.remiseAppliquee),totalHT:(a.totalHT==null||a.totalHT==='')?'':parseNum(a.totalHT)});
          log.push('➕ Ligne ajoutée — '+(a.libelle||a.ref||'')); break;
        }
        case 'ajouter_regle':{ if(!a.motCle) break; state.regles.push({id:uid('r'),motCle:a.motCle,type:'interdit',note:'Ligne facturée à tort'}); log.push('🚫 Règle ajoutée — '+a.motCle); break; }
        case 'lancer_controle':{ go('controle'); log.push('🔎 Contrôle des prix ouvert'); break; }
        case 'generer_reclamations':{ log.push('✉️ Génération des réclamations'); setTimeout(genReclamations,250); break; }
        case 'naviguer':{ if(a.vue){ go(a.vue); log.push('↪︎ Onglet — '+a.vue); } break; }
        default: log.push('❓ Action inconnue — '+(a.type||'?'));
      }
    }catch(e){ log.push('❌ Erreur sur '+(a.type||'?')+' — '+e.message); }
  });
  if(log.length){ save(); renderAll(); }
  return log;
}

async function aiCall(messages, opts){
  opts=opts||{};
  const cfg=aiCfg();
  const body={ model:AI_MODEL, max_tokens:opts.max_tokens||1200, system:opts.system||AI_SYSTEM, messages };
  let url='https://api.anthropic.com/v1/messages';
  const headers={'Content-Type':'application/json'};
  if(cfg.endpoint){ url=cfg.endpoint; }
  else if(cfg.key){ headers['x-api-key']=cfg.key; headers['anthropic-version']='2023-06-01'; headers['anthropic-dangerous-direct-browser-access']='true'; }
  const r=await fetch(url,{method:'POST',headers,body:JSON.stringify(body)});
  if(!r.ok){ const t=await r.text().catch(()=> ''); throw new Error('HTTP '+r.status+(t?(' — '+t.slice(0,180)):'')); }
  const data=await r.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
}

/* ---------- Lecture de facture par l'IA (photo / PDF -> champs) ---------- */
function readFileForAI(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{ const res=String(r.result||''); const data=res.split(',')[1]||'';
      const mime=file.type||'image/jpeg';
      const kind=(/pdf/i.test(mime)||/\.pdf$/i.test(file.name))?'pdf':'image';
      resolve({data, mime: kind==='pdf'?'application/pdf':mime, kind}); };
    r.onerror=()=>reject(new Error('Lecture du fichier impossible'));
    r.readAsDataURL(file);
  });
}
async function aiExtractFacture(file){
  if(file.size > 9*1024*1024) throw new Error('Fichier trop lourd (max ~9 Mo)');
  const {data, mime, kind}=await readFileForAI(file);
  const block = kind==='pdf'
    ? {type:'document', source:{type:'base64', media_type:'application/pdf', data}}
    : {type:'image',    source:{type:'base64', media_type:mime, data}};
  const sys=`Tu extrais les informations d'UNE facture (française) pour les saisir dans un CRM comptable.
Réponds STRICTEMENT par un objet JSON, sans aucun texte autour, au format :
{"type":"achat","tiers":"","ref":"","date":"AAAA-MM-JJ","ht":0,"tva":20,"ttc":0,"libelle":""}
Règles : type="achat" si c'est une facture reçue d'un fournisseur, "vente" si c'est une facture émise à un client. tiers = nom du fournisseur (ou du client pour une vente). ref = numéro de facture. date = date de la facture (AAAA-MM-JJ). ht/ttc = montants en nombres (point décimal, sans symbole). tva = taux en % (ex 20, 10, 5.5, 0). libelle = courte description. Mets "" ou 0 si une valeur est absente.`;
  const messages=[{role:'user', content:[ block, {type:'text', text:'Extrais les champs de cette facture en JSON.'} ]}];
  const raw=await aiCall(messages, {system:sys, max_tokens:700});
  let parsed=null;
  try{ parsed=JSON.parse(raw.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'')); }catch(e){}
  if(!parsed || typeof parsed!=='object') throw new Error('Réponse illisible : '+raw.slice(0,120));
  return parsed;
}
function scanFacture(){
  const i=document.createElement('input'); i.type='file'; i.accept='image/*,application/pdf';
  i.onchange=async e=>{
    const file=e.target.files[0]; if(!file) return;
    const btn=document.getElementById('scanBtn');
    if(btn){ btn.disabled=true; btn.dataset.html=btn.innerHTML; btn.innerHTML='⏳ Lecture…'; }
    try{
      const d=await aiExtractFacture(file);
      const g=id=>document.getElementById(id);
      if(g('f_type') && d.type) g('f_type').value=(d.type==='vente'?'vente':'achat');
      if(g('f_tiers') && d.tiers) g('f_tiers').value=d.tiers;
      if(g('f_ref') && d.ref) g('f_ref').value=String(d.ref);
      if(g('f_date') && d.date && /^\d{4}-\d{2}-\d{2}$/.test(d.date)) g('f_date').value=d.date;
      if(g('f_lib') && d.libelle) g('f_lib').value=d.libelle;
      if(g('f_ht') && d.ht!=null && d.ht!=='') g('f_ht').value=String(d.ht).replace('.',',');
      if(g('f_tva') && d.tva!=null && d.tva!=='') g('f_tva').value=String(parseNum(d.tva));
      if(g('f_ttc') && d.ttc!=null && d.ttc!=='' && parseNum(d.ttc)>0){ g('f_ttc').value=String(d.ttc).replace('.',','); }
      else if(typeof calcFromHT==='function'){ calcFromHT(); }
      toast('Facture lue ✓ — vérifie les champs puis Enregistre','ok');
    }catch(err){ toast('Lecture impossible : '+((err&&err.message)||err),'err'); }
    finally{ const b=document.getElementById('scanBtn'); if(b){ b.disabled=false; b.innerHTML=b.dataset.html||'📷 Scanner'; } }
  };
  i.click();
}

let aiBusy=false, aiHist=[];
let aiPendingFile=null;
function aiAttach(){
  const i=document.createElement('input'); i.type='file'; i.accept='image/*,application/pdf';
  i.onchange=e=>{ const f=e.target.files[0]; if(!f) return; if(f.size>9*1024*1024){ aiPush('error','Fichier trop lourd (max ~9 Mo).'); return; } aiPendingFile=f; aiRenderAttach(); const ta=document.getElementById('ai-input'); if(ta) ta.focus(); };
  i.click();
}
function aiClearAttach(){ aiPendingFile=null; aiRenderAttach(); }
function aiRenderAttach(){
  const c=document.getElementById('ai-attach'); if(!c) return;
  if(aiPendingFile){ c.style.display='flex'; c.innerHTML=`<span class="ai-attach-chip">📎 ${esc(aiPendingFile.name)} <button onclick="aiClearAttach()" title="Retirer">✕</button></span>`; }
  else { c.style.display='none'; c.innerHTML=''; }
}
async function aiSend(){
  if(aiBusy) return;
  const ta=document.getElementById('ai-input'); const q=(ta.value||'').trim();
  const file=aiPendingFile;
  if(!q && !file) return;
  ta.value=''; ta.style.height='auto';
  aiPush('user', (file?('📎 '+file.name+(q?'\n':'')):'')+q);
  aiClearAttach(); aiBusy=true; aiTyping(true);
  const snap='[État actuel du CRM]\n'+JSON.stringify(aiSnapshot());
  const ask=q || (file?'Voici une facture (image ou PDF). Lis-la et crée la facture correspondante dans le CRM avec l\'action creer_facture (extrais le tiers, la référence, la date, le HT, la TVA et le TTC).':'');
  const userText=snap+'\n\n[Demande de l\'utilisateur]\n'+ask;
  let content=userText;
  if(file){
    try{
      const r=await readFileForAI(file);
      const block = r.kind==='pdf' ? {type:'document',source:{type:'base64',media_type:'application/pdf',data:r.data}} : {type:'image',source:{type:'base64',media_type:r.mime,data:r.data}};
      content=[block,{type:'text',text:userText}];
    }catch(e){ aiTyping(false); aiBusy=false; aiPush('error','Lecture du fichier impossible : '+((e&&e.message)||e)); return; }
  }
  const messages=[...aiHist, {role:'user', content}];
  try{
    const raw=await aiCall(messages);
    let parsed=null;
    try{ parsed=JSON.parse(raw.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'')); }catch(e){}
    let reply='', actions=[];
    if(parsed && typeof parsed==='object'){ reply=parsed.reply||''; actions=Array.isArray(parsed.actions)?parsed.actions:[]; }
    else { reply=raw; }
    const log=aiApply(actions);
    aiHist.push({role:'user',content:userText+(file?' [facture jointe analysée]':'')}); aiHist.push({role:'assistant',content:raw});
    if(aiHist.length>16) aiHist=aiHist.slice(-16);
    aiTyping(false); aiBusy=false;
    aiPush('assistant', reply || (log.length?'C\'est fait.':'(réponse vide)'));
    if(log.length) aiPush('log', log.join('\n'));
    aiUpdateMode();
  }catch(e){ aiTyping(false); aiBusy=false; aiPush('error', aiErr(e)); }
}
function aiErr(e){
  const m=String((e&&e.message)||e); const cfg=aiCfg();
  if(/401|403/.test(m) && !cfg.endpoint && !cfg.key) return "Aucune clé API n'est configurée. En préversion claude.ai, l'Assistant fonctionne sans clé ; sur ton site déployé, ouvre ⚙️ et renseigne l'URL de ton proxy (recommandé) ou ta clé Anthropic.";
  if(/Failed to fetch|NetworkError/i.test(m)) return "Connexion impossible. Si tu es sur le site déployé, vérifie l'URL du proxy dans ⚙️ (ou ta connexion).";
  return "Échec de l'appel à Claude — "+m;
}

function aiPush(role, text){
  const log=document.getElementById('ai-log'); if(!log) return;
  const wrap=document.createElement('div'); wrap.className='ai-msg ai-'+role;
  if(role==='log'){ wrap.innerHTML='<pre>'+esc(text)+'</pre>'; }
  else { wrap.textContent=text; }
  const empty=log.querySelector('.ai-empty'); if(empty) empty.remove();
  log.appendChild(wrap); log.scrollTop=log.scrollHeight;
}
let aiTypeEl=null;
function aiTyping(on){
  const log=document.getElementById('ai-log'); if(!log) return;
  if(on){ aiTypeEl=document.createElement('div'); aiTypeEl.className='ai-msg ai-assistant ai-typing'; aiTypeEl.innerHTML='<span></span><span></span><span></span>'; log.appendChild(aiTypeEl); log.scrollTop=log.scrollHeight; }
  else if(aiTypeEl){ aiTypeEl.remove(); aiTypeEl=null; }

/* ============================================================
   Authentification (portail client — gate souple)
   Les mots de passe ne sont JAMAIS en clair : on stocke des SHA-256.
   ============================================================ */
const USERS = [{"u":"jonathan","name":"Jonathan Partouche","role":"admin","hash":"51123ddd07f085c97dc4a46343577fc14de93b8a6f3704bb5da2994489159995"},{"u":"naomi","name":"Naomi (compta B2E)","role":"manager","hash":"675f17efbac8494a8bddced67acd6d4282de1139bba8b563b77a4cbdd1863878"},{"u":"benjamin","name":"Benjamin Tordjman","role":"manager","hash":"9018c0c7e42de4eb0dd80164bc0362c0e6017310e2055608f0b5d530ecdc4d7b"}];
// SHA-256 autonome (geraintluff) — fonctionne en https, http et file://
function sha256(ascii){
  function rightRotate(v,a){ return (v>>>a)|(v<<(32-a)); }
  var mathPow=Math.pow, maxWord=mathPow(2,32), result='';
  var words=[], asciiBitLength=ascii.length*8;
  var hash=sha256.h=sha256.h||[], k=sha256.k=sha256.k||[], primeCounter=k.length;
  var isComposite={};
  for(var candidate=2; primeCounter<64; candidate++){
    if(!isComposite[candidate]){
      for(var i=0;i<313;i+=candidate){ isComposite[i]=candidate; }
      hash[primeCounter]=(mathPow(candidate,.5)*maxWord)|0;
      k[primeCounter++]=(mathPow(candidate,1/3)*maxWord)|0;
    }
  }
  ascii+='\x80';
  while(ascii.length%64-56) ascii+='\x00';
  for(i=0;i<ascii.length;i++){
    var j=ascii.charCodeAt(i);
    if(j>>8) return;
    words[i>>2]|=j<<((3-i)%4)*8;
  }
  words[words.length]=((asciiBitLength/maxWord)|0);
  words[words.length]=(asciiBitLength);
  for(var jj=0;jj<words.length;){
    var w=words.slice(jj,jj+=16), oldHash=hash;
    hash=hash.slice(0,8);
    for(i=0;i<64;i++){
      var w15=w[i-15], w2=w[i-2], a=hash[0], e=hash[4];
      var temp1=hash[7]
        +(rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25))
        +((e&hash[5])^((~e)&hash[6]))+k[i]
        +(w[i]=i<16?w[i]:(w[i-16]+(rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3))
          +w[i-7]+(rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10)))|0);
      var temp2=(rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22))
        +((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(temp1+temp2)|0].concat(hash);
      hash[4]=(hash[4]+temp1)|0;
    }
    for(i=0;i<8;i++){ hash[i]=(hash[i]+oldHash[i])|0; }
  }
  for(i=0;i<8;i++){
    for(j=3;j+1;j--){
      var b=(hash[i]>>(j*8))&255;
      result+=((b<16)?0:'')+b.toString(16);
    }
  }
  return result;
}
function lgCurrent(){ try{ return JSON.parse(sessionStorage.getItem('lav_user')||'null'); }catch(e){ return null; } }
function lgLogin(){
  const u=document.getElementById('lg_user').value, p=document.getElementById('lg_pwd').value, err=document.getElementById('lg_err');
  err.textContent='';
  if(fbEnabled()){
    const email=USER_EMAILS[u]; if(!email){ err.textContent='Utilisateur inconnu.'; return; }
    const btn=document.getElementById('lg_btn'); btn.disabled=true; err.textContent='Connexion…';
    fbAuth.signInWithEmailAndPassword(email,p)
      .then(()=>{ /* onAuthStateChanged prend le relais */ })
      .catch(()=>{ err.textContent='Identifiants incorrects.'; document.getElementById('lg_pwd').value=''; btn.disabled=false; });
    return;
  }
  // mode LOCAL (sans backend) : barrière souple SHA-256
  const rec=USERS.find(x=>x.u===u);
  if(rec && sha256(u+':'+p)===rec.hash){
    sessionStorage.setItem('lav_user',JSON.stringify({u:rec.u,name:rec.name,role:rec.role}));
    lgEnter();
  } else { err.textContent='Mot de passe incorrect.'; document.getElementById('lg_pwd').value=''; }
}
function lgLogout(){
  sessionStorage.removeItem('lav_user');

}

function lgForgot(){

function lgChangePwd(){

/* ---------- Backend Firebase (actif seulement si FIREBASE_CONFIG est rempli) ---------- */
let fbApp=null, fbAuth=null, fbDb=null, fbDocRef=null, fbSaveTimer=null, fbApplying=false;
function fbEnabled(){ return typeof firebase!=='undefined' && FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey!=='REMPLACER'; }
function fbInit(){
  if(!fbEnabled()) return false;
  try{
    fbApp=firebase.initializeApp(FIREBASE_CONFIG);
    fbAuth=firebase.auth(); fbDb=firebase.firestore();
    fbDocRef=fbDb.collection('crm').doc('state');
    return true;
  }catch(e){ console.warn('Firebase init KO', e); return false; }
}
let _fbFirstSyncDone=false;
function fbApplyRemote(d){
  fbApplying=true;
  state.factures=(d.factures||[]).map(normFacture);
  state.dossiers=d.dossiers||[];
  state.catalogue=d.catalogue||[];
  state.lignes=d.lignes||[];
  state.regles=(d.regles&&d.regles.length)?d.regles:defaultRegles();
  state.veilleIgnore=d.veilleIgnore||state.veilleIgnore||{};
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
  fbApplying=false;
  renderAll();
  setSync('synced');
  // 1re synchro : on marque l'existant comme "vu" (pas de tempête de toasts) ; ensuite, on n'alerte que les nouveaux écarts d'un autre poste
  if(!_fbFirstSyncDone){ _fbFirstSyncDone=true; if(typeof markAlertsSeen==='function'){ markAlertsSeen(); if(typeof updateBell==='function') updateBell(); } }
  else if(typeof scheduleVeille==='function') scheduleVeille();
}
// amorçage des données embarquées (EMBEDDED_STATE injecté en fin de fichier)
function seedFromEmbedded(){
  if(typeof EMBEDDED_STATE==='undefined' || !EMBEDDED_STATE) return false;
  state.factures=(EMBEDDED_STATE.factures||[]).map(normFacture);
  state.dossiers=EMBEDDED_STATE.dossiers||[];
  state.catalogue=EMBEDDED_STATE.catalogue||[];
  state.lignes=EMBEDDED_STATE.lignes||[];
  state.regles=(EMBEDDED_STATE.regles&&EMBEDDED_STATE.regles.length)?EMBEDDED_STATE.regles:defaultRegles();
  return true;
}
function fbPushDoc(extra){
  return fbDocRef.set(Object.assign({
    factures:state.factures, dossiers:state.dossiers, catalogue:state.catalogue||[],
    lignes:state.lignes||[], regles:state.regles||[], veilleIgnore:state.veilleIgnore||{},
    _dataVersion:DATA_VERSION, _updatedAt:Date.now()
  }, extra||{}));
}
function fbSubscribe(){
  if(!fbDocRef) return;
  fbDocRef.onSnapshot(snap=>{
    const hasEmb=(typeof EMBEDDED_STATE!=='undefined' && EMBEDDED_STATE);
    if(snap.exists){
      const d=snap.data();
      // MIGRATION AUTO : si le cloud a une version de données obsolète, on la remplace
      // par la version embarquée corrigée (une seule fois, puis _dataVersion concorde).
      if(hasEmb && d._dataVersion!==DATA_VERSION){
        seedFromEmbedded();
        fbPushDoc({_seededBy:(lgCurrent()||{}).name||''}).catch(e=>console.warn('migrate',e));
        toast('Données mises à jour (version corrigée) ✓','ok');
        return; // le prochain snapshot affichera la version à jour
      }
      fbApplyRemote(d);
    } else if(hasEmb){
      // 1er lancement : amorcer Firestore
      seedFromEmbedded();
      fbPushDoc({_seededBy:(lgCurrent()||{}).name||''}).catch(e=>console.warn('seed',e));
    }
  }, err=>console.warn('snapshot', err));
}
// Indicateur visuel de synchronisation cloud (haut de page)
function setSync(st){
  let p=document.getElementById('syncPill');
  if(!p){ const bar=document.querySelector('.topbar'); if(!bar) return;
    p=document.createElement('span'); p.id='syncPill';
    const badge=document.getElementById('lg-badge');
    if(badge) bar.insertBefore(p,badge); else bar.appendChild(p); }
  p.style.display='inline-flex';
  if(!fbEnabled()){ p.className=''; p.innerHTML='<span class="dot"></span> Local'; return; }
  if(st==='saving'){ p.className='saving'; p.innerHTML='<span class="dot"></span> Enregistrement…'; }
  else { p.className='ok'; p.innerHTML='<span class="dot"></span> Synchronisé'; }
}
function fbPushState(){
  if(!fbEnabled() || !fbDocRef || !fbAuth || !fbAuth.currentUser || fbApplying) return;
  clearTimeout(fbSaveTimer);
  setSync('saving');
  fbSaveTimer=setTimeout(()=>{
    fbDocRef.set({
      factures:state.factures, dossiers:state.dossiers,
      catalogue:state.catalogue||[], lignes:state.lignes||[], regles:state.regles||[], veilleIgnore:state.veilleIgnore||{},
      _dataVersion:DATA_VERSION, _updatedAt:Date.now(), _updatedBy:(lgCurrent()||{}).name||''
    }).then(()=>setSync('synced'))
      .catch(()=>toast('Sync cloud échouée — réessai au prochain enregistrement','err'));
  },700);
}

  // amorçage : si rien en local, charger les données embarquées (mode local) — en cloud, Firestore prime
  if(state.factures.length===0 && state.dossiers.length===0 && seedFromEmbedded()){
    try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
  }
  if(fbInit()){
    // mode CLOUD : Firebase pilote la session
    fbAuth.onAuthStateChanged(user=>{
      if(user){
        const u=Object.keys(USER_EMAILS).find(k=>USER_EMAILS[k]===user.email) || user.email;
        const rec=USERS.find(x=>x.u===u) || {u:u, name:(user.email||'Utilisateur'), role:'manager'};
        sessionStorage.setItem('lav_user',JSON.stringify({u:rec.u,name:rec.name,role:rec.role}));
        fbSubscribe();
        lgEnter();
      } else {
        sessionStorage.removeItem('lav_user');
        if(g) g.style.display='flex'; if(pwd) pwd.focus();
      }
    });
  } else {
    // mode LOCAL
    if(lgCurrent()){ lgEnter(); }
    else { if(g) g.style.display='flex'; if(pwd) pwd.focus(); }
  }
})();

/* ---------- Raccourcis clavier ---------- */
document.addEventListener('keydown',function(e){
  const t=e.target, tag=(t.tagName||'').toLowerCase();
  const typing = tag==='input'||tag==='textarea'||tag==='select'||(t.isContentEditable);
  if(e.key==='Escape'){
    const ov=document.getElementById('overlay');
    if(ov && ov.classList.contains('open')){ closeModal(); return; }
    if(typeof closeMenu==='function') closeMenu();
    return;
  }
  const gate=document.getElementById('loginGate');
  if(gate && getComputedStyle(gate).display!=='none') return;   // pas de raccourci sur l'écran de login
  if(typing || e.metaKey || e.ctrlKey || e.altKey) return;
  if(e.key==='/'){ e.preventDefault(); const s=document.getElementById('search'); if(s){ s.focus(); if(s.select) s.select(); } }
  else if(e.key==='?'){ e.preventDefault(); openGuide(); }
  else if(e.key.toLowerCase()==='n'){ e.preventDefault(); if(typeof openFacture==='function') openFacture(); }
  else if('12345'.indexOf(e.key)>=0){ const v=['dashboard','factures','dossiers','controle','data']; if(typeof go==='function') go(v[+e.key-1]); }
});
</script>
