<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Artisans Verts — Gestion comptable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F6F1; --surface:#FFFFFF; --surface-2:#FBFAF6;
    --ink:#1B1C18; --ink-soft:#62645A; --ink-faint:#9A9C90;
    --line:#E7E4DA; --line-strong:#D8D4C7;
    --brand:#234E2C; --brand-2:#2F6A3A; --brand-tint:#EAF1EA;
    --gold:#A8761F; --gold-tint:#FBF1DC;
    --red:#A8392B; --red-tint:#F7E7E2;
    --pos:#2E7D46; --neg:#A8392B;
    --shadow:0 1px 2px rgba(27,28,24,.04), 0 4px 16px rgba(27,28,24,.05);
    --radius:10px; --radius-sm:7px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'IBM Plex Sans',system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .num{font-family:'IBM Plex Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
  a{color:var(--brand-2);text-decoration:none}

  /* ---------- Header ---------- */
  header{
    background:var(--surface); border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:50;
  }
  .topbar{
    max-width:1500px; margin:0 auto; padding:0 24px;
    display:flex; align-items:center; gap:20px; height:60px;
  }
  .brand{display:flex; align-items:center; gap:11px; flex-shrink:0}
  .leaf{width:30px;height:30px;border-radius:8px;background:var(--brand);
    display:grid;place-items:center;color:#fff}
  .brand .name{font-weight:700;font-size:15px;letter-spacing:-.2px;line-height:1.1}
  .brand .sub{font-size:11px;color:var(--ink-soft);letter-spacing:.3px}
  .grow{flex:1}
  .search{
    position:relative; flex:1; max-width:340px;
  }
  .search input{
    width:100%; height:36px; padding:0 12px 0 34px;
    background:var(--surface-2); border:1px solid var(--line);
    border-radius:8px; outline:none; transition:.12s;
  }
  .search input:focus{border-color:var(--brand-2);background:#fff;box-shadow:0 0 0 3px var(--brand-tint)}
  .search svg{position:absolute;left:11px;top:9px;color:var(--ink-faint)}
  .actions{display:flex;gap:8px;align-items:center}
  .btn{
    height:36px; padding:0 14px; border-radius:8px; font-weight:500;
    display:inline-flex; align-items:center; gap:7px; white-space:nowrap;
    border:1px solid var(--line-strong); background:var(--surface); transition:.12s;
  }
  .btn:hover{background:var(--surface-2);border-color:var(--ink-faint)}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
  .btn.primary:hover{background:var(--brand-2);border-color:var(--brand-2)}
  .btn.icon{padding:0;width:36px;justify-content:center}
  .btn.sm{height:30px;padding:0 10px;font-size:13px}
  .btn.ghost{border-color:transparent;background:transparent}
  .btn.ghost:hover{background:var(--surface-2)}

  /* dropdown */
  .menu-wrap{position:relative}
  .menu{
    position:absolute; right:0; top:42px; background:#fff;
    border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow);
    min-width:210px; padding:6px; display:none; z-index:60;
  }
  .menu.open{display:block}
  .menu button{
    width:100%; text-align:left; padding:8px 10px; border-radius:6px;
    display:flex; align-items:center; gap:9px; font-size:13.5px;
  }
  .menu button:hover{background:var(--surface-2)}
  .menu .sep{height:1px;background:var(--line);margin:5px 0}
  .menu button.danger{color:var(--red)}

  /* tabs */
  .tabs{max-width:1500px;margin:0 auto;padding:0 24px;display:flex;gap:2px}
  .tab{
    padding:11px 16px 13px; font-weight:500; color:var(--ink-soft);
    border-bottom:2px solid transparent; margin-bottom:-1px; transition:.12s;
  }
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand)}
  .tab .badge{font-size:11px;background:var(--line);color:var(--ink-soft);
    border-radius:20px;padding:1px 7px;margin-left:6px;font-weight:600}
  .tab.active .badge{background:var(--brand-tint);color:var(--brand)}

  /* ---------- Layout ---------- */
  main{max-width:1500px;margin:0 auto;padding:24px}
  .view{display:none}
  .view.active{display:block;animation:fade .18s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:16px;flex-wrap:wrap}
  .section-head h2{font-size:18px;letter-spacing:-.3px;font-weight:600}
  .section-head .meta{font-size:13px;color:var(--ink-soft)}

  /* ---------- KPI cards ---------- */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .kpi{
    background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow);
  }
  .kpi .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);font-weight:600}
  .kpi .val{font-size:25px;font-weight:600;margin-top:7px;letter-spacing:-.5px;color:var(--ink)}
  .kpi .val.brand{color:var(--brand)}
  .kpi .val.pos{color:var(--pos)} .kpi .val.neg{color:var(--neg)}
  .kpi .hint{font-size:12px;color:var(--ink-soft);margin-top:4px}
  .kpi .hint b{color:var(--ink)}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .panel-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .panel-head h3{font-size:14px;font-weight:600}
  .panel-head .small{font-size:12px;color:var(--ink-soft)}
  .panel-body{padding:16px 18px}

  .grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:22px}

  /* bar list */
  .bars{display:flex;flex-direction:column;gap:11px}
  .bar-row{display:grid;grid-template-columns:170px 1fr auto;gap:12px;align-items:center}
  .bar-row .nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{height:8px;background:var(--surface-2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .bar-fill{height:100%;background:var(--brand);border-radius:6px}
  .bar-fill.neg{background:var(--red)}
  .bar-row .v{font-size:13px;font-weight:600;white-space:nowrap}

  /* ---------- Filter bar ---------- */
  .filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .filters select,.filters input[type=month]{
    height:34px;padding:0 10px;border:1px solid var(--line-strong);border-radius:7px;
    background:var(--surface);outline:none;cursor:pointer;
  }
  .filters select:focus{border-color:var(--brand-2)}
  .chip-toggle{display:flex;border:1px solid var(--line-strong);border-radius:7px;overflow:hidden}
  .chip-toggle button{padding:0 12px;height:34px;font-size:13px;color:var(--ink-soft);border-right:1px solid var(--line)}
  .chip-toggle button:last-child{border-right:none}
  .chip-toggle button.on{background:var(--brand);color:#fff}
  .filter-clear{margin-left:auto}

  /* ---------- Table ---------- */
  .table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .tscroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{
    text-align:left; padding:11px 14px; font-size:11.5px; text-transform:uppercase;
    letter-spacing:.5px; color:var(--ink-soft); font-weight:600;
    background:var(--surface-2); border-bottom:1px solid var(--line); white-space:nowrap;
    position:sticky; top:0; cursor:pointer; user-select:none;
  }
  thead th.no-sort{cursor:default}
  thead th .arr{opacity:.35;margin-left:3px}
  thead th.sorted .arr{opacity:1;color:var(--brand)}
  th.r,td.r{text-align:right}
  tbody td{padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .1s}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr.clickable{cursor:pointer}
  tfoot td{padding:12px 14px;font-weight:600;background:var(--surface-2);border-top:2px solid var(--line-strong)}
  .cell-ref{font-size:12.5px;color:var(--ink-soft)}
  .cell-strong{font-weight:500}
  .tiers-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle}

  .badge-status{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
  .st-paye{background:var(--brand-tint);color:var(--brand)}
  .st-attente{background:var(--gold-tint);color:var(--gold)}
  .st-retard{background:var(--red-tint);color:var(--red)}
  .dot{width:6px;height:6px;border-radius:50%}
  .st-paye .dot{background:var(--brand)} .st-attente .dot{background:var(--gold)} .st-retard .dot{background:var(--red)}

  .tag{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--surface-2);border:1px solid var(--line);font-size:12px;color:var(--ink-soft)}
  .type-pill{font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px}
  .type-achat{background:#F0EFE9;color:var(--ink-soft)}
  .type-vente{background:var(--brand-tint);color:var(--brand)}

  .row-actions{display:flex;gap:4px;opacity:0;transition:.1s}
  tr:hover .row-actions{opacity:1}
  .row-actions button{width:28px;height:28px;border-radius:6px;display:grid;place-items:center;color:var(--ink-soft)}
  .row-actions button:hover{background:var(--line);color:var(--ink)}
  .row-actions button.del:hover{background:var(--red-tint);color:var(--red)}

  /* empty state */
  .empty{padding:60px 24px;text-align:center}
  .empty .ic{width:54px;height:54px;border-radius:14px;background:var(--brand-tint);color:var(--brand);display:grid;place-items:center;margin:0 auto 16px}
  .empty h3{font-size:16px;margin-bottom:6px}
  .empty p{color:var(--ink-soft);max-width:380px;margin:0 auto 18px}

  /* ---------- Dossiers ---------- */
  .doss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .doss-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .doss-top{padding:15px 17px;border-bottom:1px solid var(--line)}
  .doss-top .nm{font-weight:600;font-size:15px;letter-spacing:-.2px}
  .doss-top .cli{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
  .doss-meta{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .doss-fin{padding:14px 17px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
  .fin-cell .l{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);font-weight:600}
  .fin-cell .n{font-size:15px;font-weight:600;margin-top:3px}
  .fin-cell .n.pos{color:var(--pos)} .fin-cell .n.neg{color:var(--neg)}
  .marge-bar{height:6px;background:var(--surface-2);border-radius:5px;margin:0 17px 14px;overflow:hidden;border:1px solid var(--line)}
  .marge-bar .f{height:100%;background:var(--pos)}
  .doss-foot{padding:11px 17px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:var(--surface-2)}
  .doss-foot .cnt{font-size:12.5px;color:var(--ink-soft)}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(27,28,24,.45);backdrop-filter:blur(2px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:560px;box-shadow:0 24px 60px rgba(0,0,0,.25);animation:pop .18s ease}
  .modal.wide{max-width:860px}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .modal-head h3{font-size:16px;font-weight:600}
  .modal-head .x{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--ink-soft)}
  .modal-head .x:hover{background:var(--surface-2)}
  .modal-body{padding:20px 22px}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .fg-full{grid-column:1/-1}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
  .field input,.field select,.field textarea{
    width:100%;height:38px;padding:0 11px;border:1px solid var(--line-strong);border-radius:8px;background:var(--surface);outline:none;transition:.12s;
  }
  .field textarea{height:auto;padding:9px 11px;resize:vertical;min-height:60px}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand-2);box-shadow:0 0 0 3px var(--brand-tint)}
  .field .calc{font-size:12px;color:var(--ink-soft);margin-top:5px}
  .input-eur{position:relative}
  .input-eur input{padding-right:26px}
  .input-eur::after{content:'€';position:absolute;right:11px;top:9px;color:var(--ink-faint);font-size:13px}

  /* import */
  .drop{border:1.5px dashed var(--line-strong);border-radius:12px;padding:26px;text-align:center;transition:.12s;background:var(--surface-2)}
  .drop.over{border-color:var(--brand);background:var(--brand-tint)}
  .drop h4{font-size:14px;margin-bottom:5px}
  .drop p{font-size:13px;color:var(--ink-soft);margin-bottom:14px}
  .or{display:flex;align-items:center;gap:12px;color:var(--ink-faint);font-size:12px;margin:16px 0}
  .or::before,.or::after{content:'';flex:1;height:1px;background:var(--line)}
  .map-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
  .map-table td{padding:7px 8px;border-bottom:1px solid var(--line)}
  .map-table td:first-child{font-weight:500;width:42%}
  .map-table select{width:100%;height:34px;border:1px solid var(--line-strong);border-radius:7px;padding:0 8px;background:#fff}
  .preview-tbl{font-size:12px;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-top:14px}
  .preview-tbl table{font-size:12px}
  .preview-tbl th{font-size:10.5px;padding:7px 9px}
  .preview-tbl td{padding:6px 9px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:.22s;z-index:200;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.ok{background:var(--brand)}
  .toast.err{background:var(--red)}

  .hint-row{font-size:12.5px;color:var(--ink-soft);display:flex;gap:7px;align-items:flex-start;background:var(--gold-tint);border:1px solid #EBDCB8;border-radius:9px;padding:10px 12px;margin-bottom:16px}
  .hint-row svg{flex-shrink:0;margin-top:1px;color:var(--gold)}

  @media (max-width:900px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .grid-2{grid-template-columns:1fr}
    .topbar{flex-wrap:wrap;height:auto;padding:10px 16px;gap:10px}
    .search{order:3;max-width:none;flex-basis:100%}
    .tabs{overflow-x:auto;padding:0 16px}
    .form-grid{grid-template-columns:1fr}
    .bar-row{grid-template-columns:110px 1fr auto}
    main{padding:16px}
  }
</style>
</head>
<body>

<!-- ====== Portail de connexion (accès réservé) ====== -->
<div id="loginGate" aria-modal="true">
  <div class="lg-card">
    <div class="lg-logo">🌿 Les Artisans Verts</div>
    <div class="lg-sub">CRM comptable — accès réservé</div>
    <label class="lg-l" for="lg_user">Utilisateur</label>
    <select id="lg_user">
      <option value="jonathan">Jonathan Partouche</option>
      <option value="naomi">Naomi (compta B2E)</option>
      <option value="benjamin">Benjamin Tordjman</option>
    </select>
    <label class="lg-l" for="lg_pwd">Mot de passe</label>
    <input id="lg_pwd" type="password" autocomplete="current-password" placeholder="••••••••">
    <button id="lg_btn" type="button">Se connecter →</button>
    <div id="lg_err" class="lg-err"></div>
    <div class="lg-forgot"><a href="#" id="lg_forgot">Mot de passe oublié ?</a></div>
    <div class="lg-note">Accès protégé aux 3 comptes autorisés.</div>
  </div>
</div>
<style>
#loginGate{position:fixed;inset:0;z-index:99999;display:none;align-items:center;justify-content:center;background:#f4efe4;font-family:'IBM Plex Sans',system-ui,sans-serif}
#loginGate .lg-card{background:#fff;border:1px solid #e3dcc9;border-radius:16px;padding:32px 28px;width:min(92vw,360px);box-shadow:0 18px 50px rgba(35,78,44,.16)}
#loginGate .lg-logo{font-size:22px;font-weight:700;color:#234E2C}
#loginGate .lg-sub{color:#6b7666;font-size:13px;margin:4px 0 22px}
#loginGate .lg-l{display:block;font-size:12px;font-weight:600;color:#3a463a;margin:12px 0 5px}
#loginGate select,#loginGate input{width:100%;padding:11px 12px;border:1px solid #d8d0bd;border-radius:9px;font-size:15px;background:#fff;box-sizing:border-box}
#loginGate #lg_btn{width:100%;margin-top:18px;padding:12px;border:0;border-radius:9px;background:#234E2C;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
#loginGate #lg_btn:hover{background:#1b3d22}
#loginGate .lg-err{font-size:13px;margin-top:10px;min-height:18px;color:#b3261e}
#loginGate .lg-forgot{margin-top:12px;text-align:center}
#loginGate .lg-forgot a{color:#234E2C;font-size:13px;text-decoration:underline;cursor:pointer}
#loginGate .lg-note{color:#97a08e;font-size:11px;margin-top:14px;text-align:center}
#lg-badge{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:#234E2C;margin-left:auto}
#lg-badge button{border:1px solid #d8d0bd;background:#fff;border-radius:7px;padding:3px 9px;cursor:pointer;font-size:12px;color:#6b7666}

/* ====== Ergonomie & fluidité (ajouts) ====== */
html{scroll-behavior:smooth}
*:focus-visible{outline:2px solid var(--brand-2);outline-offset:2px;border-radius:4px}
.btn:active{transform:translateY(1px)}
.tab:active{transform:translateY(1px)}
.overlay{animation:ovfade .16s ease}
@keyframes ovfade{from{opacity:0}to{opacity:1}}
.guide-btn svg{transition:.15s}
.guide-btn:hover svg{transform:scale(1.08)}
/* indicateur de synchronisation cloud */
#syncPill{display:none;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink-soft);white-space:nowrap;margin-left:10px}
#syncPill .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-faint)}
#syncPill.ok{color:var(--brand);border-color:var(--brand-tint);background:var(--brand-tint)} #syncPill.ok .dot{background:var(--pos)}
#syncPill.saving{color:var(--gold);border-color:var(--gold-tint);background:var(--gold-tint)} #syncPill.saving .dot{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
/* ====== Guide d'utilisation ====== */
.guide{max-height:70vh;overflow:auto;font-size:14px;line-height:1.6}
.guide .g-hello{font-size:15px}
.guide .g-intro{color:var(--ink-soft);background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:10px 0 4px}
.guide .g-toc{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 6px}
.guide .g-toc a{font-size:12.5px;font-weight:600;padding:5px 10px;border:1px solid var(--line);border-radius:20px;background:var(--surface)}
.guide .g-toc a:hover{background:var(--brand-tint);border-color:var(--brand-tint);color:var(--brand)}
.guide h4{margin:22px 0 10px;font-size:15.5px;color:var(--brand);scroll-margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
.guide ul{margin:0 0 6px;padding-left:18px} .guide li{margin:5px 0}

<script>
/* ============================================================
   Les Artisans Verts — CRM comptable (single-file)
   Données : factures + dossiers, marge analytique par dossier.
   Stockage : localStorage (fonctionne en local / GitHub Pages),
   avec repli mémoire si indisponible. Sauvegarde réelle = export JSON.
   ============================================================ */

const KEY = 'lav_compta_v1';
const TVA_RATES = [20, 10, 5.5, 0];
const CATEGORIES = ['Matériel','Pose / Main d\'œuvre','Transport','Sous-traitance','Commission','Frais généraux','Autre'];

/* ---------- state + storage (safe) ---------- */
let mem = null; // in-memory fallback
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){ mem = JSON.stringify(state); } if(typeof fbPushState==='function') fbPushState(); }
function load(){
  try{ const r = localStorage.getItem(KEY); if(r) return JSON.parse(r); }catch(e){}
  if(mem){ try{ return JSON.parse(mem); }catch(e){} }
  return null;
}
const uid = (p='id') => p + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-3);
let state = load() || { factures:[], dossiers:[] };
state.catalogue = state.catalogue || [];   // référentiel tarifaire (prix convenus, remises)
state.lignes    = state.lignes    || [];   // lignes de facture à contrôler
state.regles    = state.regles    || defaultRegles(); // mots-clés de lignes facturées à tort

/* ---------- helpers ---------- */
const eur = new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2});
const eur0 = new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});
const fmt = v => eur.format(v||0);
const fmtK = v => Math.abs(v)>=10000 ? eur0.format(v||0) : eur.format(v||0);
const pct = v => (v==null||!isFinite(v)) ? '—' : (v*100).toFixed(1).replace('.',',')+' %';
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return '—'; const [y,m,d]=iso.split('-'); return d&&m&&y ? `${d}/${m}/${y}` : iso; }
function daysUntil(iso){ if(!iso) return null; const t=new Date(iso+'T00:00:00'), n=new Date(todayISO()+'T00:00:00'); return Math.round((t-n)/86400000); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// robust French/EN number parsing: "1 234,56 €" "1.234,56" "1234.56" "12,5%"
function parseNum(v){
  if(typeof v === 'number') return v;
  if(v==null) return 0;
  let s = String(v).trim().replace(/\u00a0/g,' ').replace(/[€%\s]/g,'').replace(/[A-Za-z]/g,'');
  if(s==='') return 0;
  const hasDot = s.includes('.'), hasCom = s.includes(',');
  if(hasDot && hasCom){ s = s.replace(/\./g,'').replace(',','.'); }       // 1.234,56
  else if(hasCom){ s = s.replace(',','.'); }                                // 1234,56
  // else plain dot or integer
  const n = parseFloat(s);
  return isFinite(n) ? n : 0;
}

// color hash for tiers dot
function tierColor(name){
  let h=0; for(let i=0;i<(name||'').length;i++) h=(h*31+name.charCodeAt(i))%360;
  return `hsl(${h} 42% 46%)`;
}

// normalize a facture (compute missing HT/TTC from rate)
function normFacture(f){
  let ht = parseNum(f.ht), ttc = parseNum(f.ttc), rate = f.tva==null?20:parseNum(f.tva);
  if(ht && !ttc) ttc = ht*(1+rate/100);
  else if(ttc && !ht) ht = ttc/(1+rate/100);
  else if(ht && ttc && !f._rateLocked){ const r=(ttc/ht-1)*100; if(isFinite(r)&&r>=0&&r<60) rate=Math.round(r*10)/10; }
  return {...f, ht:round2(ht), ttc:round2(ttc), tva:rate};
}
const round2 = n => Math.round((n||0)*100)/100;

function dossierName(id){ const d=state.dossiers.find(x=>x.id===id); return d?d.nom:''; }
function isOverdue(f){ return f.statut==='attente' && f.echeance && daysUntil(f.echeance)<0; }
function effStatut(f){ return f.statut==='paye' ? 'paye' : (isOverdue(f) ? 'retard' : 'attente'); }

/* ---------- derived stats ---------- */
function dossierStats(id){
  const fs = state.factures.filter(f=>f.dossierId===id);
  const charges = fs.filter(f=>f.type!=='vente').reduce((s,f)=>s+(f.ht||0),0);
  const ventes  = fs.filter(f=>f.type==='vente').reduce((s,f)=>s+(f.ht||0),0);
  const d = state.dossiers.find(x=>x.id===id) || {};
  const produits = (d.produits!=null && d.produits!=='') ? parseNum(d.produits) : ventes;
  const marge = produits - charges;
  const tauxMarge = produits>0 ? marge/produits : null;
  const aPayer = fs.filter(f=>f.type!=='vente' && f.statut!=='paye').reduce((s,f)=>s+(f.ttc||0),0);
  return {charges, ventes, produits, marge, tauxMarge, count:fs.length, aPayer};
}
function globalStats(){
  let charges=0, produitsVente=0, manuelProduits=0, impayeMontant=0, impayeCount=0, ech30=0, ech30Count=0, encaisser=0;
  state.factures.forEach(f=>{
    if(f.type==='vente'){ produitsVente+=f.ht||0; if(f.statut!=='paye'){ encaisser+=f.ttc||0; } }
    else { charges+=f.ht||0;
      if(f.statut!=='paye'){ impayeMontant+=f.ttc||0; impayeCount++;
        const du=daysUntil(f.echeance); if(du!=null && du>=0 && du<=30){ ech30+=f.ttc||0; ech30Count++; } }
    }
  });
  // produits = manual dossier produits override sum where set, else vente
  let produits=0;
  state.dossiers.forEach(d=>{ const st=dossierStats(d.id); produits+=st.produits; });
  // factures sans dossier (vente) still counted via produitsVente fallback if no dossier carries them
  const orphanVente = state.factures.filter(f=>f.type==='vente' && !f.dossierId).reduce((s,f)=>s+(f.ht||0),0);
  produits += orphanVente;
  const marge = produits - charges;
  return {charges, produits, marge, tauxMarge: produits>0?marge/produits:null,
    impayeMontant, impayeCount, ech30, ech30Count, encaisser};
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function go(v){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.view===v));
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderAll(){
  document.getElementById('tabCountF').textContent = state.factures.length;
  document.getElementById('tabCountD').textContent = state.dossiers.length;
  const anoms = runControle();
  const cb = document.getElementById('tabCountC');
  if(cb){ const n = anoms.filter(a=>a.severite==='haute').length; cb.textContent = n; cb.style.display = n ? '' : 'none'; }
  renderDashboard(); renderFactures(); renderDossiers(); renderControle(anoms); renderData();
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function renderDashboard(){
  const el = document.getElementById('view-dashboard');
  if(!state.factures.length && !state.dossiers.length){
    el.innerHTML = emptyState('Bienvenue dans votre gestion comptable',
      'Importez votre tableur existant ou créez votre première facture. Les marges par dossier se calculent automatiquement.',
      `<button class="btn primary" onclick="go('data')">Importer mon tableur</button>
       <button class="btn" onclick="openFacture()">Ajouter une facture</button>`);
    return;
  }
  const g = globalStats();
  const dossById = state.dossiers.map(d=>({d, st:dossierStats(d.id)}))
    .filter(x=>x.st.count>0 || x.st.produits>0)
    .sort((a,b)=>b.st.marge-a.st.marge);
  const maxAbs = Math.max(1, ...dossById.map(x=>Math.abs(x.st.marge)));

  // top fournisseurs (achat) by HT
  const four = {};
  state.factures.filter(f=>f.type!=='vente').forEach(f=>{ const k=(f.tiers||'—'); four[k]=(four[k]||0)+(f.ht||0); });
  const fourArr = Object.entries(four).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const maxFour = Math.max(1,...fourArr.map(x=>x[1]));

  // répartition par activité (orientée factures)
  const zmapD={}; state.dossiers.forEach(d=>zmapD[d.id]=d.zone||'Autres');
  const zoneStats={};
  state.dossiers.forEach(d=>{ const z=d.zone||'Autres'; const s=dossierStats(d.id);
    zoneStats[z]=zoneStats[z]||{ca:0,ch:0,nd:0,nf:0}; zoneStats[z].nd++; zoneStats[z].ca+=s.produits; zoneStats[z].ch+=s.charges; });
  state.factures.forEach(f=>{ const z=zmapD[f.dossierId]; if(z&&zoneStats[z]) zoneStats[z].nf++; });
  const zKnown=['ITE','AGRI','AMPLEUR','LED'];
  const zoneOrder=zKnown.filter(z=>zoneStats[z]).concat(Object.keys(zoneStats).filter(z=>!zKnown.includes(z)));
  const zcards=zoneOrder.map(z=>{ const v=zoneStats[z], mg=v.ca-v.ch, m=(typeof ZMETA!=='undefined'&&ZMETA[z])||{ic:'📁',lbl:z};
    return `<button class="zstat zh-${z}" onclick="setFactZone('${z}')" title="Voir les factures ${esc(z)}">
      <div class="zstat-h">${m.ic} <b>${esc((m.lbl||z).split(' — ')[0])}</b> <span>${v.nf} fact.</span></div>
      <div class="zstat-mg">${fmtK(v.ch)}</div>
      <div class="zstat-sub">charges · ${v.nd} dossier${v.nd>1?'s':''}${v.ca>0?` · marge <b class="${mg>=0?'pos':'neg'}">${fmtK(mg)}</b>`:''}</div>
    </button>`;}).join('');

  el.innerHTML = `
    <div class="section-head"><h2>Tableau de bord</h2>
      <div class="meta">${state.factures.length} factures · ${state.dossiers.length} dossiers</div></div>

    <div class="kpis">
      <div class="kpi"><div class="label">Produits (CA HT)</div>
        <div class="val brand">${fmtK(g.produits)}</div>
        <div class="hint">Charges&nbsp;: <b>${fmtK(g.charges)}</b></div></div>
      <div class="kpi"><div class="label">Marge nette</div>
        <div class="val ${g.marge>=0?'pos':'neg'}">${fmtK(g.marge)}</div>
        <div class="hint">Taux&nbsp;: <b>${pct(g.tauxMarge)}</b></div></div>
      <div class="kpi"><div class="label">À décaisser (impayé)</div>
        <div class="val">${fmtK(g.impayeMontant)}</div>
        <div class="hint"><b>${g.impayeCount}</b> facture${g.impayeCount>1?'s':''} fournisseur</div></div>
      <div class="kpi"><div class="label">Échéances ≤ 30 j</div>
        <div class="val ${g.ech30>0?'neg':''}">${fmtK(g.ech30)}</div>
        <div class="hint"><b>${g.ech30Count}</b> à régler bientôt</div></div>
    </div>

    <div class="panel zone-panel">
      <div class="panel-head"><h3>Factures par activité</h3><span class="small">Cliquez pour filtrer les factures · charges HT</span></div>
      <div class="zstats">${zcards}</div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-head"><h3>Marge par dossier</h3><span class="small">Produits − charges (HT)</span></div>
        <div class="panel-body">
          ${dossById.length ? `<div class="bars">${dossById.slice(0,9).map(x=>{

let fFilter = { zone:'', dossier:'', statut:'', type:'', month:'', sort:'date', dir:-1 };
let searchTerm = '';

function setFilter(k,v){ fFilter[k]=v; renderFactures(); }
function setFactZone(z){ fFilter.zone=z; go('factures'); }          // depuis le tableau de bord
function zoneOf(f){ const d=state.dossiers.find(x=>x.id===f.dossierId); return d?(d.zone||''):''; }

function filteredFactures(){
  let arr = state.factures.slice();
  const q = searchTerm.toLowerCase();
  if(q) arr = arr.filter(f=>[f.tiers,f.ref,f.libelle,dossierName(f.dossierId),f.categorie].join(' ').toLowerCase().includes(q));
  if(fFilter.zone){ const zm={}; state.dossiers.forEach(d=>zm[d.id]=d.zone||''); arr = arr.filter(f=> (zm[f.dossierId]||'')===fFilter.zone); }
  if(fFilter.dossier) arr = arr.filter(f=> fFilter.dossier==='__none__' ? !f.dossierId : f.dossierId===fFilter.dossier);
  if(fFilter.type) arr = arr.filter(f=>(f.type||'achat')===fFilter.type);
  if(fFilter.statut){
    if(fFilter.statut==='retard') arr=arr.filter(f=>isOverdue(f));
    else arr=arr.filter(f=>(f.statut||'attente')===fFilter.statut && !(fFilter.statut==='attente'&&isOverdue(f)) || (fFilter.statut==='attente'));
    if(fFilter.statut==='attente') arr=arr.filter(f=>f.statut!=='paye');
  }
  if(fFilter.month) arr = arr.filter(f=>(f.date||'').slice(0,7)===fFilter.month);
  const s=fFilter.sort, dir=fFilter.dir;
  arr.sort((a,b)=>{
    let av,bv;
    if(s==='ht'||s==='ttc'||s==='tva'){ av=a[s]||0; bv=b[s]||0; }
    else if(s==='dossier'){ av=dossierName(a.dossierId); bv=dossierName(b.dossierId); }
    else { av=(a[s]||'').toString().toLowerCase(); bv=(b[s]||'').toString().toLowerCase(); }
    return av<bv?-dir:av>bv?dir:0;
  });
  return arr;
}

function sortBy(c){ if(fFilter.sort===c) fFilter.dir*=-1; else { fFilter.sort=c; fFilter.dir = (c==='ht'||c==='ttc'||c==='tva'||c==='date')?-1:1; } renderFactures(); }
function clearFilters(){ fFilter={...fFilter,zone:'',dossier:'',statut:'',type:'',month:''}; searchTerm=''; document.getElementById('search').value=''; renderFactures(); }

function statusBadge(f){
  const s = effStatut(f);
  const map = {paye:['st-paye','Payé'], attente:['st-attente','À payer'], retard:['st-retard','En retard']};
  const [c,l]=map[s];
  return `<span class="badge-status ${c}"><span class="dot"></span>${l}</span>`;
}

function toggleStatut(id){ const f=state.factures.find(x=>x.id===id); if(!f) return; f.statut = f.statut==='paye'?'attente':'paye'; save(); renderAll(); }

          <input id="f_ref" value="${esc(v.ref||'')}" placeholder="N° de facture"></div>

        <div class="field"><label>Dossier</label>

function calcFromHT(silent){
  const ht=parseNum(document.getElementById('f_ht').value);
  const rate=parseNum(document.getElementById('f_tva').value);
  if(document.activeElement && document.activeElement.id==='f_ttc') return;
  const ttc=ht*(1+rate/100);
  if(ht) document.getElementById('f_ttc').value = round2(ttc).toFixed(2).replace('.',',');
  updateCalcHint();
}
function calcFromTTC(){
  const ttc=parseNum(document.getElementById('f_ttc').value);
  const rate=parseNum(document.getElementById('f_tva').value);
  const ht=ttc/(1+rate/100);
  if(ttc) document.getElementById('f_ht').value = round2(ht).toFixed(2).replace('.',',');
  updateCalcHint();
}
function updateCalcHint(){
  const ht=parseNum(document.getElementById('f_ht').value), ttc=parseNum(document.getElementById('f_ttc').value);
  const el=document.getElementById('f_calc'); if(!el) return;
  el.textContent = (ht||ttc) ? `TVA : ${fmt(ttc-ht)}` : '';
}

function saveFacture(id){
  const g=i=>document.getElementById(i);
  let dossierId = g('f_doss').value;
  const rec = normFacture({
    type: g('f_type').value, date: g('f_date').value, tiers: g('f_tiers').value.trim(),
    ref: g('f_ref').value.trim(), libelle: g('f_lib').value.trim(), dossierId,
    categorie: g('f_cat').value.trim(),
    ht: parseNum(g('f_ht').value), tva: parseNum(g('f_tva').value), ttc: parseNum(g('f_ttc').value),
    statut: g('f_statut').value, echeance: g('f_ech').value, _rateLocked:true
  });
  if(!rec.tiers && !rec.ref && !rec.ht && !rec.ttc){ toast('Renseignez au moins un tiers ou un montant.','err'); return; }
  if(id){ const i=state.factures.findIndex(x=>x.id===id); rec.id=id; state.factures[i]=rec; }
  else { rec.id=uid('f'); state.factures.unshift(rec); }
  save(); closeModal(); renderAll(); toast(id?'Facture mise à jour':'Facture ajoutée','ok');
}
function delFacture(id, fromModal){
  if(!confirm('Supprimer cette facture ?')) return;
  state.factures = state.factures.filter(f=>f.id!==id);
  save(); if(fromModal) closeModal(); renderAll(); toast('Facture supprimée');
}

const ZMETA={ITE:{ic:'🏠',lbl:'ITE — Isolation ext.'},AGRI:{ic:'🌾',lbl:'AGRI — Déshumidif.'},AMPLEUR:{ic:'🏘️',lbl:'AMPLEUR — Rénov. ANAH'},LED:{ic:'💡',lbl:'LED — Éclairage indus.'}};
const ZORDER=['ITE','AGRI','AMPLEUR','LED'];
let dossZone='';            // '' = toutes les activités
let dossSearch='';
function setDossZone(z){ dossZone=z; renderDossiers(); }
function dossierCard(d){
  const st=dossierStats(d.id);

      <div class="fin-cell"><div class="l">Charges</div><div class="n">${fmtK(st.charges)}</div></div>
      <div class="fin-cell"><div class="l">Marge</div><div class="n ${st.marge>=0?'pos':'neg'}">${fmtK(st.marge)}</div></div>
    </div>
    <div class="marge-bar"><div class="f" style="width:${w}%;background:${st.marge>=0?'var(--pos)':'var(--neg)'}"></div></div>
    <div class="doss-foot">
      <span class="cnt">${st.count} facture${st.count>1?'s':''} · marge ${pct(st.tauxMarge)}</span>
      <button class="btn sm ghost" onclick="viewDossierFactures('${d.id}')">Voir les factures →</button>
    </div>
  </div>`;

function renderDossiers(){
  const el = document.getElementById('view-dossiers');
  if(!state.dossiers.length){
    el.innerHTML = `<div class="section-head"><h2>Dossiers</h2>
      <button class="btn primary" onclick="openDossier()">Nouveau dossier</button></div>` +
      emptyState('Aucun dossier','Créez un dossier par chantier. Chaque facture rattachée alimente automatiquement sa marge.',
      `<button class="btn primary" onclick="openDossier()">Créer un dossier</button>`);
    return;
  }
  const zonesPresent=[...new Set(state.dossiers.map(d=>d.zone||'Autres'))];
  const ordered = ZORDER.filter(z=>zonesPresent.includes(z)).concat(zonesPresent.filter(z=>!ZORDER.includes(z)).sort());
  const chip=(z,lbl,ic,n)=>`<button class="zchip ${dossZone===z?'active':''} ${z?('zc-'+z):''}" onclick="setDossZone('${z}')">${ic} ${lbl}${n!=null?` <span class="zc-n">${n}</span>`:''}</button>`;
  let chips=chip('','Tous','📋',state.dossiers.length);
  ordered.forEach(z=>{ const m=ZMETA[z]||{ic:'📁',lbl:z}; chips+=chip(z,m.lbl.split(' — ')[0],m.ic,state.dossiers.filter(d=>(d.zone||'Autres')===z).length); });

  const zonesToShow = dossZone ? [dossZone] : ordered;

/* ---- CSV parsing ---- */
function detectDelim(txt){
  const line = txt.split(/\r?\n/).find(l=>l.trim());
  if(!line) return ',';
  const counts={';':(line.match(/;/g)||[]).length, ',':(line.match(/,/g)||[]).length, '\t':(line.match(/\t/g)||[]).length};
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
}
function parseCSV(txt, delim){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<txt.length;i++){
    const c=txt[i], n=txt[i+1];
    if(q){ if(c==='"'&&n==='"'){cur+='"';i++;} else if(c==='"'){q=false;} else cur+=c; }
    else { if(c==='"') q=true;
      else if(c===delim){ row.push(cur); cur=''; }
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
      else if(c==='\r'){}
      else cur+=c; }
  }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=>r.some(c=>c.trim()!==''));
}

let pendingRows=null, pendingHeaders=null;
const FIELD_DEFS = [
  ['date','Date'], ['type','Type (achat/vente)'], ['tiers','Tiers (fournisseur/client)'],
  ['ref','Référence facture'], ['libelle','Libellé'], ['dossier','Dossier (nom)'],
  ['categorie','Catégorie analytique'], ['ht','Montant HT'], ['tva','TVA (%)'],
  ['ttc','Montant TTC'], ['statut','Statut'], ['echeance','Échéance']
];
function guessMap(headers){
  const m={};
  const find = (...keys)=> headers.findIndex(h=>{ const x=h.toLowerCase(); return keys.some(k=>x.includes(k)); });
  m.date=find('date','jour'); m.type=find('type','sens','achat','vente');
  m.tiers=find('tiers','fournisseur','client','nom','société','societe','fourni');
  m.ref=find('réf','ref','numéro','numero','n°','facture n','pièce','piece');
  m.libelle=find('libellé','libelle','désign','design','objet','description');
  m.dossier=find('dossier','chantier','projet','affaire','lot');
  m.categorie=find('catég','categ','analytique','poste','rubrique');
  m.ht=find('ht','hors taxe','base'); m.tva=find('tva','taux'); m.ttc=find('ttc','toutes taxes','total ttc','ttc','montant ttc');
  m.statut=find('statut','état','etat','paiement','payé','paye','réglé','regle');
  m.echeance=find('échéance','echeance','due','limite');
  return m;
}
function startMapping(rows){
  if(rows.length<2){ toast('Fichier vide ou sans données.','err'); return; }
  pendingHeaders = rows[0].map(h=>h.trim());
  pendingRows = rows.slice(1);
  const guess = guessMap(pendingHeaders);
  const opt = (sel)=>`<option value="-1">— Ignorer —</option>`+pendingHeaders.map((h,i)=>`<option value="${i}" ${sel===i?'selected':''}>${esc(h||('Colonne '+(i+1)))}</option>`).join('');
  const preview = pendingRows.slice(0,4);

  document.getElementById('modal').className='modal wide';
  document.getElementById('modal').innerHTML=`
    <div class="modal-head"><h3>Associer les colonnes (${pendingRows.length} lignes détectées)</h3>
      <button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:14px">Reliez chaque champ du CRM à une colonne de votre fichier. Les dossiers inexistants seront créés automatiquement.</p>
      <table class="map-table"><tbody>
        ${FIELD_DEFS.map(([k,lbl])=>`<tr><td>${lbl}</td><td><select id="map_${k}">${opt(guess[k])}</select></td></tr>`).join('')}
      </tbody></table>
      <div class="preview-tbl"><div style="overflow-x:auto"><table>
        <thead><tr>${pendingHeaders.map(h=>`<th class="no-sort">${esc(h)}</th>`).join('')}</tr></thead>
        <tbody>${preview.map(r=>`<tr>${pendingHeaders.map((_,i)=>`<td>${esc(r[i]||'')}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div></div>
    </div>
    <div class="modal-foot"><span style="font-size:12px;color:var(--ink-soft)">Aperçu des 4 premières lignes</span>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="closeModal()">Annuler</button>
        <button class="btn primary" onclick="commitImport()">Importer ${pendingRows.length} factures</button>
      </div></div>`;
  document.getElementById('overlay').classList.add('open');
}
function commitImport(){
  const g=k=>{ const i=parseInt(document.getElementById('map_'+k).value); return i; };
  const map={}; FIELD_DEFS.forEach(([k])=>map[k]=g(k));
  if(map.tiers<0 && map.ref<0 && map.ht<0 && map.ttc<0){ toast('Associez au moins un tiers, une référence ou un montant.','err'); return; }

  const dossCache={}; state.dossiers.forEach(d=>dossCache[d.nom.toLowerCase()]=d.id);
  let added=0, newDoss=0;
  pendingRows.forEach(r=>{
    const cell=k=> map[k]>=0 ? (r[map[k]]||'').trim() : '';
    let dossierId='';
    const dnom=cell('dossier');
    if(dnom){ const key=dnom.toLowerCase();
      if(dossCache[key]) dossierId=dossCache[key];
      else { const nd={id:uid('d'),nom:dnom,client:'',fiche:'',zone:'',statut:'En cours',produits:'',notes:''};
        state.dossiers.push(nd); dossCache[key]=nd.id; dossierId=nd.id; newDoss++; } }

    let type='achat'; const tv=cell('type').toLowerCase();
    if(tv.includes('vente')||tv.includes('client')||tv.includes('produit')||tv==='v') type='vente';

    let statut='attente'; const sv=cell('statut').toLowerCase();
    if(sv.includes('pay')||sv.includes('réglé')||sv.includes('regle')||sv.includes('ok')||sv==='oui'||sv.includes('soldé')) statut='paye';

    const rec=normFacture({
      type, date:normDate(cell('date')), tiers:cell('tiers'), ref:cell('ref'),
      libelle:cell('libelle'), dossierId, categorie:cell('categorie'),
      ht:parseNum(cell('ht')), tva: map.tva>=0?parseNum(cell('tva')):20, ttc:parseNum(cell('ttc')),
      statut, echeance:normDate(cell('echeance'))
    });
    rec.id=uid('f'); state.factures.unshift(rec); added++;
  });
  pendingRows=null; pendingHeaders=null;
  save(); closeModal(); go('factures');
  toast(`${added} factures importées${newDoss?` · ${newDoss} dossier(s) créé(s)`:''}`,'ok');
}
// accepts dd/mm/yyyy, yyyy-mm-dd, dd-mm-yyyy → ISO
function normDate(s){
  if(!s) return ''; s=s.trim();
  let m=s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/); if(m) return `${m[1]}-${pad(m[2])}-${pad(m[3])}`;
  m=s.match(/^(\d{1,2})[-/.](\d{1,2})[-/.](\d{2,4})$/);
  if(m){ let y=m[3]; if(y.length===2) y='20'+y; return `${y}-${pad(m[2])}-${pad(m[1])}`; }
  return '';
}
const pad=n=>String(n).padStart(2,'0');

function setupDrop(){
  const drop=document.getElementById('drop'); if(!drop) return;
  ['dragenter','dragover'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('over');}));
  ['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('over');}));
  drop.addEventListener('drop',ev=>{ const f=ev.dataTransfer.files[0]; if(f) readCSVFile(f); });
}
function readCSVFile(file){
  const r=new FileReader();
  r.onload=e=>{ const txt=e.target.result; const rows=parseCSV(txt, detectDelim(txt)); startMapping(rows); };
  r.readAsText(file,'utf-8');
}
function parsePasted(){
  const txt=document.getElementById('pasteArea').value;
  if(!txt.trim()){ toast('Collez d\'abord vos données.','err'); return; }
  const rows=parseCSV(txt, detectDelim(txt)); startMapping(rows);
}

/* ---- export / backup ---- */
function dl(content, name, mime){
  const blob=new Blob([content],{type:mime}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url);
}

document.getElementById('jsonIn').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{ try{
      const data=JSON.parse(ev.target.result);
      if(!Array.isArray(data.factures)||!Array.isArray(data.dossiers)) throw 0;
      if(state.factures.length||state.dossiers.length){
        if(!confirm('Remplacer les données actuelles par cette sauvegarde ?')) return;
      }
      state={factures:data.factures, dossiers:data.dossiers, catalogue:data.catalogue||[], lignes:data.lignes||[], regles:data.regles||defaultRegles()};
      // re-normalize for safety
      state.factures=state.factures.map(normFacture);
      save(); go('dashboard'); toast('Sauvegarde restaurée','ok');
    }catch(err){ toast('Fichier JSON invalide.','err'); }
    e.target.value='';
  };
  r.readAsText(f);
});

/* ============================================================
   CONTRÔLE DES PRIX — agent de détection d'erreurs de facturation
   Méthode AXDIS : tarifs convenus, lignes facturées à tort, remises omises,
   + doublons et incohérences de calcul. 100% déterministe (chiffres fiables).
   ============================================================ */
const TOL = 0.01; // tolérance € / %

function defaultRegles(){
  return [
    {id:uid('r'), motCle:'vélo cargo', type:'interdit', note:'Frais de transport vélo cargo facturés à tort'},
    {id:uid('r'), motCle:'velo cargo', type:'interdit', note:'Frais de transport vélo cargo facturés à tort'}
  ];
}

// rapproche une ligne de facture d'une référence du catalogue
function matchCatalogue(l){
  const f=(l.fournisseur||'').toLowerCase().trim();
  const ref=(l.ref||'').toLowerCase().trim();
  const lib=(l.libelle||'').toLowerCase().trim();
  const sameF = c => !c.fournisseur || c.fournisseur.toLowerCase().trim()===f || f==='';
  const cands = state.catalogue.filter(sameF);
  let m = ref && cands.find(c=>(c.ref||'').toLowerCase().trim()===ref);                 // 1. réf exacte (même fournisseur)
  if(m) return m;
  m = lib && cands.find(c=>(c.libelle||'').toLowerCase().trim()===lib);                  // 2. libellé exact
  if(m) return m;
  m = lib && cands.find(c=>{ const cl=(c.libelle||'').toLowerCase().trim(); return cl && (lib.includes(cl)||cl.includes(lib)); }); // 3. libellé contenu
  if(m) return m;
  m = ref && state.catalogue.find(c=>(c.ref||'').toLowerCase().trim()===ref);            // 4. réf seule, tous fournisseurs
  return m||null;
}

function lineTotal(l){
  if(l.totalHT!=null && l.totalHT!=='') return parseNum(l.totalHT);
  return round2((parseNum(l.quantite)||0)*(parseNum(l.puFacture)||0)*(1-(parseNum(l.remiseAppliquee)||0)/100));
}

// MOTEUR : renvoie la liste des anomalies
function runControle(){
  const A=[]; const seen={};
  (state.lignes||[]).forEach(l=>{
    const qte=parseNum(l.quantite)||0, pu=parseNum(l.puFacture)||0, rem=parseNum(l.remiseAppliquee)||0;
    const total=lineTotal(l);
    const lib=(l.libelle||'').toLowerCase();

    // doublon EN PREMIER : la ligne entière est contestée, on ne cumule aucun autre écart dessus
    const key=[(l.fournisseur||'').toLowerCase().trim(),(l.facture||'').toLowerCase().trim(),(l.ref||'').toLowerCase().trim(),lib,total].join('|');
    if(seen[key]){
      A.push({ligneId:l.id, l, categorie:'Doublon', severite:'haute', ecart:Math.max(0,total),
        detail:`Doublon de la facture ${esc(l.facture||'—')} (ligne identique déjà présente)`});
      return;
    }
    seen[key]=true;

    const ruleHit=(state.regles||[]).find(r=> r.motCle && lib.includes(r.motCle.toLowerCase()));
    if(ruleHit && ruleHit.type==='interdit'){
      A.push({ligneId:l.id, l, categorie:'Ligne indue', severite:'haute', ecart:Math.max(0,total),
        detail:`Ligne facturée à tort — ${esc(ruleHit.note||ruleHit.motCle)}`});
    } else {
      const cat=matchCatalogue(l);
      if(cat){
        const expectedNet = round2(parseNum(cat.puConvenu)*(1-(parseNum(cat.remiseAttendue)||0)/100));
        const billedNet   = round2(pu*(1-rem/100));
        const diffUnit    = round2(billedNet-expectedNet);
        if(diffUnit>TOL){
          const ecart=round2(diffUnit*qte);
          const priceOver=(pu-parseNum(cat.puConvenu))>TOL;
          const remGap=((parseNum(cat.remiseAttendue)||0)-rem)>TOL;
          let categorie,detail;
          if(priceOver && remGap){ categorie='Tarif + remise'; detail=`PU facturé ${fmt(pu)} > convenu ${fmt(cat.puConvenu)}, et remise ${rem}% au lieu de ${cat.remiseAttendue}%`; }
          else if(remGap){ categorie='Remise non appliquée'; detail=`Remise ${rem}% appliquée au lieu de ${cat.remiseAttendue}% convenue`; }
          else { categorie='Dépassement de tarif'; detail=`PU facturé ${fmt(pu)} > tarif convenu ${fmt(cat.puConvenu)}`; }
          A.push({ligneId:l.id, l, categorie, severite:'haute', ecart, detail});
        }
      } else {
        A.push({ligneId:l.id, l, categorie:'Hors catalogue', severite:'moyenne', ecart:0,
          detail:'Référence absente du référentiel tarifaire — à vérifier'});
      }
    }
    // incohérence de calcul (qté × PU − remise ≠ total facturé)
    if(l.totalHT!=null && l.totalHT!==''){
      const recompute=round2(qte*pu*(1-rem/100));
      if(Math.abs(total-recompute) > Math.max(TOL, recompute*0.001)){
        A.push({ligneId:l.id, l, categorie:'Incohérence de calcul', severite:'moyenne', ecart:round2(total-recompute>0?total-recompute:0),
          detail:`Total facturé ${fmt(total)} ≠ ${qte} × ${fmt(pu)}${rem?` − ${rem}%`:''} = ${fmt(recompute)}`});
      }
    }
  });
  return A;
}

function controleSummary(anoms){
  let recup=0, verif=0; const byCat={}, byFour={};
  anoms.forEach(a=>{
    if(a.severite==='haute' && a.ecart>0){ recup+=a.ecart; byCat[a.categorie]=(byCat[a.categorie]||0)+a.ecart; const f=a.l.fournisseur||'—'; byFour[f]=(byFour[f]||0)+a.ecart; }
    if(a.severite==='moyenne') verif++;
  });
  return {recup, verif, byCat, byFour};
}
function catBadge(a){ const c=a.severite==='haute'?'st-retard':'st-attente'; return `<span class="badge-status ${c}"><span class="dot"></span>${esc(a.categorie)}</span>`; }

let cFilter={cat:'',four:'',sev:''};

function renderControle(anoms){

  if(!hasLignes){

    <div class="kpi"><div class="label">Fournisseurs</div><div class="val">${Object.keys(s.byFour).length}</div><div class="hint">avec écart chiffré</div></div>
  </div>`;

  const cats=Object.entries(s.byCat).sort((a,b)=>b[1]-a[1]); const maxC=Math.max(1,...cats.map(x=>x[1]));
  const fours=Object.entries(s.byFour).sort((a,b)=>b[1]-a[1]); const maxF=Math.max(1,...fours.map(x=>x[1]));
  html+=`<div class="grid-2">

    <div class="panel"><div class="panel-head"><h3>Récupérable par fournisseur</h3></div><div class="panel-body">${fours.length?`<div class="bars">${fours.map(([n,v])=>`<div class="bar-row"><div class="nm" title="${esc(n)}">${esc(n)}</div><div class="bar-track"><div class="bar-fill neg" style="width:${Math.round(v/maxF*100)}%;background:${tierColor(n)}"></div></div><div class="v">${fmtK(v)}</div></div>`).join('')}</div>`:`<p style="color:var(--ink-soft);font-size:13px">—</p>`}</div></div>

  let fa=anoms.slice();
  if(cFilter.cat) fa=fa.filter(a=>a.categorie===cFilter.cat);
  if(cFilter.four) fa=fa.filter(a=>(a.l.fournisseur||'—')===cFilter.four);
  if(cFilter.sev) fa=fa.filter(a=>a.severite===cFilter.sev);
  fa.sort((a,b)=>b.ecart-a.ecart);
  const totFiltre=fa.filter(a=>a.ecart>0).reduce((s2,a)=>s2+a.ecart,0);

  html+=`<div class="section-head" style="margin-top:6px"><h2 style="font-size:15px">Anomalies détectées</h2><div class="meta">${fa.length} / ${anoms.length}</div></div>

/* ---- import CSV (lignes & catalogue) ---- */
const LIGNE_DEFS=[['fournisseur','Fournisseur'],['facture','N° facture'],['date','Date'],['ref','Référence produit'],['libelle','Désignation / libellé'],['quantite','Quantité'],['puFacture','PU facturé HT'],['remiseAppliquee','Remise appliquée (%)'],['totalHT','Total ligne HT']];
const CATA_DEFS=[['fournisseur','Fournisseur'],['ref','Référence produit'],['libelle','Désignation / libellé'],['puConvenu','PU convenu HT'],['remiseAttendue','Remise attendue (%)']];
function guessLignes(h){ const f=(...k)=>h.findIndex(x=>k.some(s=>x.toLowerCase().includes(s)));
  return {fournisseur:f('fournisseur','fourni','tiers','société','societe'),facture:f('facture','n°','numéro','numero','pièce','piece'),date:f('date'),ref:f('réf','ref','code','article','sku'),libelle:f('désign','design','libell','produit','description'),quantite:f('quant','qté','qte'),puFacture:f('pu ','p.u','prix unit','unitaire','pu'),remiseAppliquee:f('remise','rabais','discount'),totalHT:f('total','montant ht','montant','ht')}; }
function guessCata(h){ const f=(...k)=>h.findIndex(x=>k.some(s=>x.toLowerCase().includes(s)));
  return {fournisseur:f('fournisseur','fourni','tiers'),ref:f('réf','ref','code','article','sku'),libelle:f('désign','design','libell','produit','description'),puConvenu:f('convenu','négoci','negoci','tarif','prix','unitaire','pu'),remiseAttendue:f('remise','rabais','discount')}; }
function commitLignes(rows,map){ let n=0;
  rows.forEach(r=>{ const c=k=>map[k]>=0?(r[map[k]]||'').trim():'';
    state.lignes.push({id:uid('l'),fournisseur:c('fournisseur'),facture:c('facture'),date:normDate(c('date')),ref:c('ref'),libelle:c('libelle'),
      quantite:parseNum(c('quantite'))||1,puFacture:parseNum(c('puFacture')),remiseAppliquee:parseNum(c('remiseAppliquee')),
      totalHT:(map.totalHT>=0 && c('totalHT')!=='')?parseNum(c('totalHT')):''}); n++; });
  save(); closeModal(); go('controle'); toast(`${n} lignes importées`,'ok');
}
function commitCatalogue(rows,map){ let n=0;
  rows.forEach(r=>{ const c=k=>map[k]>=0?(r[map[k]]||'').trim():''; if(!c('libelle') && !c('ref')) return;
    state.catalogue.push({id:uid('c'),fournisseur:c('fournisseur'),ref:c('ref'),libelle:c('libelle'),puConvenu:parseNum(c('puConvenu')),remiseAttendue:parseNum(c('remiseAttendue'))}); n++; });
  save(); closeModal(); go('controle'); toast(`${n} références importées`,'ok');
}
function pickCSV(cb){ const i=document.createElement('input'); i.type='file'; i.accept='.csv,.tsv,.txt';
  i.onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{ const txt=ev.target.result; cb(parseCSV(txt,detectDelim(txt))); }; r.readAsText(f,'utf-8'); }; i.click(); }
function importLignes(){ pickCSV(rows=>startGenericMapping(rows,LIGNE_DEFS,guessLignes,commitLignes,'lignes de facture')); }
function importCatalogue(){ pickCSV(rows=>startGenericMapping(rows,CATA_DEFS,guessCata,commitCatalogue,'référentiel tarifaire')); }

let gImp={rows:null,headers:null,defs:null,commit:null};
function startGenericMapping(rows,defs,guess,commit,noun){
  if(rows.length<2){ toast('Fichier vide ou sans données.','err'); return; }
  gImp={rows:rows.slice(1),headers:rows[0].map(h=>h.trim()),defs,commit};
  const g=guess(gImp.headers);
  const opt=sel=>`<option value="-1">— Ignorer —</option>`+gImp.headers.map((h,i)=>`<option value="${i}" ${sel===i?'selected':''}>${esc(h||('Col '+(i+1)))}</option>`).join('');
  const prev=gImp.rows.slice(0,4);
  document.getElementById('modal').className='modal wide';
  document.getElementById('modal').innerHTML=`
    <div class="modal-head"><h3>Associer les colonnes — ${noun} (${gImp.rows.length} lignes)</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:14px">Relie chaque champ à une colonne de ton fichier.</p>
      <table class="map-table"><tbody>${defs.map(([k,lbl])=>`<tr><td>${lbl}</td><td><select id="gm_${k}">${opt(g[k])}</select></td></tr>`).join('')}</tbody></table>
      <div class="preview-tbl"><div style="overflow-x:auto"><table><thead><tr>${gImp.headers.map(h=>`<th class="no-sort">${esc(h)}</th>`).join('')}</tr></thead><tbody>${prev.map(r=>`<tr>${gImp.headers.map((_,i)=>`<td>${esc(r[i]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>
    </div>
    <div class="modal-foot"><span style="font-size:12px;color:var(--ink-soft)">Aperçu (4 lignes)</span>
      <div style="display:flex;gap:8px"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn primary" onclick="runGenericCommit()">Importer</button></div></div>`;
  document.getElementById('overlay').classList.add('open');
}
function runGenericCommit(){ const map={}; gImp.defs.forEach(([k])=>map[k]=parseInt(document.getElementById('gm_'+k).value)); gImp.commit(gImp.rows,map); }

/* ---- réclamations (LRAR déterministe) ---- */
function buildLetter(four, items){
  const total=items.reduce((s,a)=>s+a.ecart,0);
  const d=new Date().toLocaleDateString('fr-FR');
  const lignes=items.map(a=>`  • Facture ${a.l.facture||'—'} — ${a.l.libelle||a.l.ref||'(désignation)'} — ${a.categorie} : ${fmt(a.ecart)}`).join('\n');
  return `LES ARTISANS VERTS
[Adresse — à compléter]

À l'attention de : ${four}
[Adresse du fournisseur — à compléter]

Objet : Réclamation — erreurs de facturation
Envoi en recommandé avec accusé de réception
Le ${d}

Madame, Monsieur,

Après contrôle de vos factures, nous avons relevé les écarts de facturation suivants, non conformes à nos accords tarifaires :

${lignes}

Montant total réclamé : ${fmt(total)} HT.

Nous vous remercions de bien vouloir émettre un avoir correspondant à cette somme dans un délai de trente (30) jours à compter de la réception du présent courrier.

Dans l'attente de votre régularisation, nous vous prions d'agréer, Madame, Monsieur, l'expression de nos salutations distinguées.

Les Artisans Verts`;
}
function genReclamations(){
  const anoms=runControle().filter(a=>a.severite==='haute' && a.ecart>0);
  if(!anoms.length){ toast('Aucun écart récupérable à réclamer pour le moment.','err'); return; }
  const byF={}; anoms.forEach(a=>{ const f=a.l.fournisseur||'(fournisseur inconnu)'; (byF[f]=byF[f]||[]).push(a); });
  const fns=Object.keys(byF);
  document.getElementById('modal').className='modal wide';
  document.getElementById('modal').innerHTML=`
    <div class="modal-head"><h3>Réclamations — ${fns.length} fournisseur${fns.length>1?'s':''}</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-body" style="max-height:64vh;overflow:auto">
      ${fns.map((f,i)=>{ const total=byF[f].reduce((s,a)=>s+a.ecart,0); const letter=buildLetter(f,byF[f]);
        return `<div style="border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--surface-2);border-bottom:1px solid var(--line)">
            <div><b>${esc(f)}</b> <span style="color:var(--ink-soft);font-size:12.5px">· ${byF[f].length} ligne(s) · ${fmt(total)} HT</span></div>
            <div style="display:flex;gap:6px"><button class="btn sm" onclick="copyText('letter_${i}')">Copier</button><button class="btn sm" onclick="dlLetter('letter_${i}','${esc(f).replace(/[^a-z0-9]/gi,'_')}')">.txt</button></div>
          </div>
          <pre id="letter_${i}" style="margin:0;padding:14px;font-family:'IBM Plex Mono',monospace;font-size:12px;white-space:pre-wrap;line-height:1.55;color:var(--ink)">${esc(letter)}</pre>
        </div>`; }).join('')}
    </div>
    <div class="modal-foot"><span style="font-size:12px;color:var(--ink-soft)">Modèle LRAR — complète les adresses avant envoi.</span>
      <button class="btn primary" onclick="closeModal()">Fermer</button></div>`;
  document.getElementById('overlay').classList.add('open');
}
function dlLetter(id,name){ dl(document.getElementById(id).innerText, `reclamation-${name}-${todayISO()}.txt`, 'text/plain;charset=utf-8'); toast('Lettre téléchargée','ok'); }
function copyText(id){ const t=document.getElementById(id).innerText;
  if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>toast('Copié','ok'),()=>toast('Copie impossible','err')); }
  else { const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy'); toast('Copié','ok');}catch(e){toast('Copie impossible','err');} ta.remove(); } }

/* ============================================================
   ASSISTANT IA INTÉGRÉ — "demande des actions depuis l'intérieur"
   Double mode : préversion claude.ai (sans clé) / déployé (proxy ou clé Anthropic).
   Le modèle renvoie un JSON {reply, actions[]} que le CRM exécute localement.
   ============================================================ */
const AI_MODEL='claude-sonnet-4-6';
const AI_SYSTEM=`Tu es l'assistant intégré au CRM "Les Artisans Verts" (comptabilité CEE/CAE, fournisseurs/prestataires, contrôle des prix). Tu réponds en français, de façon concise et directe.

Tu peux exécuter des actions dans le CRM. Tu DOIS répondre UNIQUEMENT par un objet JSON valide, sans aucun texte autour ni balise Markdown, de la forme :
{"reply":"phrase courte pour l'utilisateur","actions":[ ... ]}

"reply" = ce que tu dis à l'utilisateur. "actions" = liste (éventuellement vide) d'actions à exécuter.

Actions disponibles :
- {"type":"creer_dossier","nom":"...","client":"...","fiche":"RES022|BAT-TH-126|...","zone":"C|D|E","statut":"En cours|Terminé|En attente|Annulé","produits":NOMBRE,"notes":"..."} — seul "nom" est obligatoire.
- {"type":"creer_facture","sens":"achat|vente","tiers":"...","ref":"...","libelle":"...","dossier":"nom d'un dossier existant","categorie":"...","ht":NOMBRE,"tva":20,"ttc":NOMBRE,"statut":"attente|paye","echeance":"AAAA-MM-JJ","date":"AAAA-MM-JJ"} — fournis "ht" OU "ttc" (l'autre est calculé).
- {"type":"ajouter_reference","fournisseur":"...","ref":"...","libelle":"...","puConvenu":NOMBRE,"remiseAttendue":NOMBRE} — référentiel tarifaire du contrôle des prix.
- {"type":"ajouter_ligne","fournisseur":"...","facture":"...","date":"AAAA-MM-JJ","ref":"...","libelle":"...","quantite":NOMBRE,"puFacture":NOMBRE,"remiseAppliquee":NOMBRE,"totalHT":NOMBRE} — ligne de facture à contrôler.
- {"type":"ajouter_regle","motCle":"..."} — mot-clé d'une ligne facturée à tort (ex. "vélo cargo").
- {"type":"lancer_controle"} — ouvre le contrôle des prix.
- {"type":"generer_reclamations"} — génère les lettres de réclamation par fournisseur.
- {"type":"naviguer","vue":"dashboard|factures|dossiers|controle|data"}.

Règles :
- Pour créer une facture rattachée à un nouveau chantier, émets d'abord "creer_dossier" puis "creer_facture" dans le même tableau "actions", dans cet ordre ; rattache via le champ "dossier".
- N'invente JAMAIS de montants : si un montant manque, demande-le dans "reply" sans émettre l'action.
- Si la demande est ambiguë, pose une question courte dans "reply" avec actions vides.
- Pour une simple question (ex. "combien je récupère chez AXDIS ?"), réponds dans "reply" à partir de l'état du CRM fourni, actions vides.
- Les montants sont des nombres JSON (pas de symbole €, point décimal).`;

function aiCfg(){ try{ return JSON.parse(localStorage.getItem('lav_ai_cfg')||'{}'); }catch(e){ return {}; } }
function aiSaveCfg(){
  const cfg={ endpoint:(document.getElementById('ai-endpoint').value||'').trim(), key:(document.getElementById('ai-key').value||'').trim() };
  try{ localStorage.setItem('lav_ai_cfg', JSON.stringify(cfg)); }catch(e){}
  document.getElementById('ai-settings').style.display='none';
  aiUpdateMode(); toast('Configuration enregistrée','ok');
}

function aiSnapshot(){
  const tiers=[...new Set(state.factures.map(f=>f.tiers).filter(Boolean))];
  const an=runControle(); const s=controleSummary(an);
  const top=an.filter(a=>a.ecart>0).sort((a,b)=>b.ecart-a.ecart).slice(0,30)
    .map(a=>({fournisseur:a.l.fournisseur||'',facture:a.l.facture||'',motif:a.categorie,ecart:a.ecart}));
  let caVente=0,charges=0; state.factures.forEach(f=>{ if(f.type==='vente')caVente+=f.ht||0; else charges+=f.ht||0; });
  return {
    dossiers: state.dossiers.map(d=>({nom:d.nom,client:d.client||'',fiche:d.fiche||'',statut:d.statut||'',produits:d.produits||''})),
    tiers,
    catalogue: state.catalogue.map(c=>({fournisseur:c.fournisseur||'',ref:c.ref||'',libelle:c.libelle||'',puConvenu:c.puConvenu,remiseAttendue:c.remiseAttendue||0})),
    controle: { recuperable: round2(s.recup), aVerifier: s.verif, anomalies: top },
    totaux: { nbFactures: state.factures.length, nbDossiers: state.dossiers.length, caVenteHT: round2(caVente), chargesHT: round2(charges), margeHT: round2(caVente-charges) }
  };
}

function aiApply(actions){
  const log=[];
  (actions||[]).forEach(a=>{
    try{
      switch(a.type){
        case 'creer_dossier':{
          if(!a.nom){ log.push('⚠️ Dossier sans nom — ignoré'); break; }
          state.dossiers.push({id:uid('d'),nom:a.nom,client:a.client||'',fiche:a.fiche||'',zone:a.zone||'',statut:a.statut||'En cours',produits:(a.produits===''||a.produits==null)?'':parseNum(a.produits),notes:a.notes||''});
          log.push('📁 Dossier créé — '+a.nom); break;
        }
        case 'creer_facture':{
          let dossierId='';
          if(a.dossier){ const q=String(a.dossier).toLowerCase(); const d=state.dossiers.find(x=>(x.nom||'').toLowerCase()===q)||state.dossiers.find(x=>(x.nom||'').toLowerCase().includes(q)); if(d)dossierId=d.id; }
          const rec=normFacture({type:(a.sens||a.type||'achat'),date:a.date||todayISO(),tiers:a.tiers||'',ref:a.ref||'',libelle:a.libelle||'',dossierId,categorie:a.categorie||'',ht:parseNum(a.ht),tva:a.tva==null?20:parseNum(a.tva),ttc:parseNum(a.ttc),statut:a.statut==='paye'?'paye':'attente',echeance:a.echeance||'',_rateLocked:(a.ht!=null&&a.ttc!=null)});
          rec.id=uid('f'); state.factures.unshift(rec);
          log.push('🧾 Facture '+rec.type+' '+(rec.tiers||'')+' — '+fmt(rec.ht)+' HT'+(dossierId?(' → '+a.dossier):'')); break;
        }
        case 'ajouter_reference':{
          if(!a.libelle && !a.ref){ log.push('⚠️ Référence sans libellé/réf — ignorée'); break; }
          state.catalogue.push({id:uid('c'),fournisseur:a.fournisseur||'',ref:a.ref||'',libelle:a.libelle||'',puConvenu:parseNum(a.puConvenu),remiseAttendue:parseNum(a.remiseAttendue)});
          log.push('📘 Référence ajoutée — '+(a.libelle||a.ref)); break;
        }
        case 'ajouter_ligne':{
          state.lignes.push({id:uid('l'),fournisseur:a.fournisseur||'',facture:a.facture||'',date:a.date||'',ref:a.ref||'',libelle:a.libelle||'',quantite:parseNum(a.quantite)||1,puFacture:parseNum(a.puFacture),remiseAppliquee:parseNum(a.remiseAppliquee),totalHT:(a.totalHT==null||a.totalHT==='')?'':parseNum(a.totalHT)});
          log.push('➕ Ligne ajoutée — '+(a.libelle||a.ref||'')); break;
        }
        case 'ajouter_regle':{ if(!a.motCle) break; state.regles.push({id:uid('r'),motCle:a.motCle,type:'interdit',note:'Ligne facturée à tort'}); log.push('🚫 Règle ajoutée — '+a.motCle); break; }
        case 'lancer_controle':{ go('controle'); log.push('🔎 Contrôle des prix ouvert'); break; }
        case 'generer_reclamations':{ log.push('✉️ Génération des réclamations'); setTimeout(genReclamations,250); break; }
        case 'naviguer':{ if(a.vue){ go(a.vue); log.push('↪︎ Onglet — '+a.vue); } break; }
        default: log.push('❓ Action inconnue — '+(a.type||'?'));
      }
    }catch(e){ log.push('❌ Erreur sur '+(a.type||'?')+' — '+e.message); }
  });
  if(log.length){ save(); renderAll(); }
  return log;
}

async function aiCall(messages){
  const cfg=aiCfg();
  const body={ model:AI_MODEL, max_tokens:1200, system:AI_SYSTEM, messages };
  let url='https://api.anthropic.com/v1/messages';
  const headers={'Content-Type':'application/json'};
  if(cfg.endpoint){ url=cfg.endpoint; }
  else if(cfg.key){ headers['x-api-key']=cfg.key; headers['anthropic-version']='2023-06-01'; headers['anthropic-dangerous-direct-browser-access']='true'; }
  const r=await fetch(url,{method:'POST',headers,body:JSON.stringify(body)});
  if(!r.ok){ const t=await r.text().catch(()=> ''); throw new Error('HTTP '+r.status+(t?(' — '+t.slice(0,180)):'')); }
  const data=await r.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
}

let aiBusy=false, aiHist=[];
async function aiSend(){
  if(aiBusy) return;
  const ta=document.getElementById('ai-input'); const q=(ta.value||'').trim(); if(!q) return;
  ta.value=''; ta.style.height='auto'; aiPush('user', q); aiBusy=true; aiTyping(true);
  const userMsg='[État actuel du CRM]\n'+JSON.stringify(aiSnapshot())+'\n\n[Demande de l\'utilisateur]\n'+q;
  const messages=[...aiHist, {role:'user', content:userMsg}];
  try{
    const raw=await aiCall(messages);
    let parsed=null;
    try{ parsed=JSON.parse(raw.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'')); }catch(e){}
    let reply='', actions=[];
    if(parsed && typeof parsed==='object'){ reply=parsed.reply||''; actions=Array.isArray(parsed.actions)?parsed.actions:[]; }
    else { reply=raw; }
    const log=aiApply(actions);
    aiHist.push({role:'user',content:userMsg}); aiHist.push({role:'assistant',content:raw});
    if(aiHist.length>16) aiHist=aiHist.slice(-16);
    aiTyping(false); aiBusy=false;
    aiPush('assistant', reply || (log.length?'C\'est fait.':'(réponse vide)'));
    if(log.length) aiPush('log', log.join('\n'));
    aiUpdateMode();
  }catch(e){ aiTyping(false); aiBusy=false; aiPush('error', aiErr(e)); }
}
function aiErr(e){
  const m=String((e&&e.message)||e); const cfg=aiCfg();
  if(/401|403/.test(m) && !cfg.endpoint && !cfg.key) return "Aucune clé API n'est configurée. En préversion claude.ai, l'Assistant fonctionne sans clé ; sur ton site déployé, ouvre ⚙️ et renseigne l'URL de ton proxy (recommandé) ou ta clé Anthropic.";
  if(/Failed to fetch|NetworkError/i.test(m)) return "Connexion impossible. Si tu es sur le site déployé, vérifie l'URL du proxy dans ⚙️ (ou ta connexion).";
  return "Échec de l'appel à Claude — "+m;
}

  else { wrap.textContent=text; }

  log.appendChild(wrap); log.scrollTop=log.scrollHeight;
}
